name: LyDia Daily Source of Truth

on:
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD date to generate. Leave blank for today."
        required: false
        default: ""
      snapshot:
        description: "posted, current, or closing"
        required: false
        default: "posted"
  schedule:
    # 11:40 UTC = 7:40 AM Eastern during MLB daylight-saving months.
    - cron: "40 11 * * *"

permissions:
  contents: write

jobs:
  generate-daily-source:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate source-of-truth daily outputs
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/generate-member-lab.js --date "${{ github.event.inputs.date }}" --snapshot "${{ github.event.inputs.snapshot || 'posted' }}"
          else
            node scripts/generate-member-lab.js --snapshot "posted"
          fi

      - name: Commit generated daily outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/member-brief data/market data/picks previews
          if git diff --cached --quiet; then
            echo "No daily output changes to commit."
          else
            git commit -m "Update LyDia daily source-of-truth outputs"
            git push
          fi
