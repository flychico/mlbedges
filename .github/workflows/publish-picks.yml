name: Publish picks (after LyDia analysis)

on:
  schedule:
    # GitHub cron is UTC. 15:05 UTC = 11:05am ET in season, after morning odds post and before first pitch.
    - cron: "5 15 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD to generate. Leave blank for today in America/New_York."
        required: false
        default: ""
      snapshot:
        description: "posted, current, or closing"
        required: false
        default: "posted"
      send_email:
        description: "Email picks to paid members? Only set true after approval."
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: publish-picks
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve publish date
        id: publish_date
        run: |
          echo "UTC:"; date -u
          echo "Eastern:"; TZ="America/New_York" date
          DATE_INPUT="${{ github.event.inputs.date }}"
          if [ -z "$DATE_INPUT" ]; then
            DATE_INPUT=$(TZ="America/New_York" date +%F)
          fi
          echo "date=$DATE_INPUT" >> "$GITHUB_OUTPUT"
          echo "Resolved publish date: $DATE_INPUT"

      - name: Clean invalid generated artifacts
        run: node scripts/site-health-cleanup.js --fix

      - name: Normalize Pitcher Matchup Tool source
        run: node scripts/normalize-pitcher-tool-source.js

      - name: Generate provisional source data and bullpen inputs
        run: |
          SNAPSHOT_INPUT="${{ github.event.inputs.snapshot }}"
          node scripts/generate-member-lab.js --date "${{ steps.publish_date.outputs.date }}" --snapshot "${SNAPSHOT_INPUT:-posted}" --defer-publish true

      - name: Update strikeout prop lines
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/update-k-props.js "${{ steps.publish_date.outputs.date }}"

      - name: Update totals projections and lines
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/update-totals.js "${{ steps.publish_date.outputs.date }}"

      - name: Enhance moneyline probabilities with projected runs and lock picks
        run: |
          SNAPSHOT_INPUT="${{ github.event.inputs.snapshot }}"
          node scripts/generate-member-lab.js --date "${{ steps.publish_date.outputs.date }}" --snapshot "${SNAPSHOT_INPUT:-posted}"

      - name: Render bettor-friendly previews
        run: node scripts/generate-previews.js "${{ steps.publish_date.outputs.date }}"

      - name: Refresh LyDia Research Desk
        run: node scripts/generate-research-desk.js

      - name: Generate canonical Pitcher Matchup Tool data
        run: node scripts/generate-pitcher-matchup-data.js "${{ steps.publish_date.outputs.date }}"

      - name: Generate matchup pages with indexing quality gate
        run: node scripts/generate-matchup-pages.js "${{ steps.publish_date.outputs.date }}"

      - name: Verify matchup pages use Pitcher Matchup Tool data
        run: node scripts/verify-pitcher-matchup-alignment.js "${{ steps.publish_date.outputs.date }}"

      - name: Refresh learning summary and verify synchronized policy
        run: |
          node scripts/generate-learning-summary.js
          node scripts/verify-learning-lab.js --require-current-totals

      - name: Verify generated data and public copy
        run: |
          DATE_INPUT="${{ steps.publish_date.outputs.date }}"
          test -f "data/member-brief/$DATE_INPUT.json" || { echo "ERROR: member brief missing"; exit 1; }
          test -f "data/published-picks/$DATE_INPUT.json" || { echo "ERROR: official pick file missing"; exit 1; }
          test -f "previews/$DATE_INPUT.html" || { echo "ERROR: preview page missing"; exit 1; }
          test -f "articles/index.html" || { echo "ERROR: Research Desk page missing"; exit 1; }
          test -f "data/pitcher-matchups/$DATE_INPUT.json" || { echo "ERROR: canonical pitcher data missing"; exit 1; }
          test -f "data/matchup-pages/$DATE_INPUT.json" || { echo "ERROR: matchup manifest missing"; exit 1; }
          test -f "mlb/matchups/index.html" || { echo "ERROR: matchup archive missing"; exit 1; }
          node -e "const fs=require('fs'); const b=JSON.parse(fs.readFileSync('data/member-brief/$DATE_INPUT.json','utf8')); const p=JSON.parse(fs.readFileSync('data/published-picks/$DATE_INPUT.json','utf8')); const s=JSON.parse(fs.readFileSync('data/pitcher-matchups/$DATE_INPUT.json','utf8')); const m=JSON.parse(fs.readFileSync('data/matchup-pages/$DATE_INPUT.json','utf8')); if(!Array.isArray(b.games)||b.games.length===0) throw new Error('member brief has zero games'); if(!Array.isArray(p.picks)) throw new Error('official pick file has no picks array'); const pitcherGames=s.games||{}; const missingPitcherRows=b.games.filter(g=>!pitcherGames[String(g.game_pk)]); if(missingPitcherRows.length) throw new Error('missing pitcher data for member-brief games: '+missingPitcherRows.map(g=>g.game_pk).join(',')); if(!Array.isArray(m.pages)||m.total_pages!==m.pages.length) throw new Error('matchup manifest page count is invalid'); const manifestPks=new Set(m.pages.map(x=>String(x.game_pk))); const missingBriefPages=b.games.filter(g=>!manifestPks.has(String(g.game_pk))); if(missingBriefPages.length) throw new Error('member-brief games missing matchup pages: '+missingBriefPages.map(g=>g.game_pk).join(',')); const outputs=m.pages.map(x=>x.output); if(new Set(outputs).size!==outputs.length) throw new Error('duplicate matchup output paths detected'); if(m.pages.some(x=>!fs.existsSync(x.output))) throw new Error('one or more matchup pages are missing'); console.log('Active games:', b.games.length, 'Official picks:', p.picks.length, 'Pitcher rows available:', Object.keys(pitcherGames).length, 'Matchup pages retained:', m.total_pages, 'Frozen pregame pages:', m.pages.filter(x=>x.preserved).length, 'Indexable:', m.indexable_pages);"
          node scripts/assert-public-clean.js
          echo "Source data, previews, matchup pages and Research Desk verified."

      - name: Commit and push if changed
        run: |
          DATE_INPUT="${{ steps.publish_date.outputs.date }}"
          git config user.name "lydia-bot"
          git config user.email "actions@users.noreply.github.com"

          # Generated outputs are authoritative for these paths. Snapshot them
          # before synchronizing with main so a concurrent manual upload cannot
          # cause a rebase conflict at the end of an otherwise valid publish.
          GENERATED_PATHS=(previews picks articles data sitemap.xml member-brief results tools mlb)
          SNAPSHOT_DIR=$(mktemp -d)
          for path in "${GENERATED_PATHS[@]}"; do
            if [ -e "$path" ]; then
              mkdir -p "$SNAPSHOT_DIR/$(dirname "$path")"
              cp -a "$path" "$SNAPSHOT_DIR/$path"
            fi
          done

          git fetch origin main
          git reset --hard origin/main

          for path in "${GENERATED_PATHS[@]}"; do
            if [ -d "$SNAPSHOT_DIR/$path" ]; then
              mkdir -p "$path"
              rsync -a --delete "$SNAPSHOT_DIR/$path/" "$path/"
            elif [ -f "$SNAPSHOT_DIR/$path" ]; then
              cp -a "$SNAPSHOT_DIR/$path" "$path"
            fi
          done

          git add previews/ picks/ articles/ data/ sitemap.xml member-brief/ results/ tools/ mlb/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Publish picks $DATE_INPUT"
            git push
          fi

      - name: Email picks to paid members
        # Scheduled runs deliver automatically; manual runs still require send_email=true.
        # The script exits cleanly if the email secrets are not configured yet.
        if: ${{ github.event_name == 'schedule' || github.event.inputs.send_email == 'true' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: node scripts/send-member-emails.js "${{ steps.publish_date.outputs.date }}"

      - name: Normalize public shell and head tags
        run: node scripts/normalize-public-shell.js

      - name: Email free daily preview to the free list
        if: ${{ github.event_name == 'schedule' || github.event.inputs.send_email == 'true' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: node scripts/send-free-preview-emails.js "${{ steps.publish_date.outputs.date }}"
