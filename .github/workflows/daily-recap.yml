name: Daily recap and grading

# Backward-looking only. Safe to run unattended.
# Grades yesterday's finished games and builds the recap/SEO pages.
# It does NOT generate today's picks or email members. That happens in
# publish-picks.yml, after LyDia's analysis and approval.

on:
  schedule:
    # GitHub Actions cron is ALWAYS UTC and does not observe DST or accept a timezone key.
    # 11:35 UTC = 7:35 AM EDT (summer) / 6:35 AM EST (winter). Runs after all games are final.
    - cron: "35 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-recap
  cancel-in-progress: false

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show run time
        run: |
          echo "UTC:"; date -u
          echo "Eastern:"; TZ="America/New_York" date

      - name: Grade yesterday's picks
        run: node scripts/grade-results.js

      - name: Generate yesterday's recap
        run: node scripts/generate-recap.js

      - name: Keep live results block on Results page
        run: |
          node scripts/dedupe-clv.js
          node scripts/inject-live-results.js

      - name: Verify recap generated
        run: |
          test -f results/index.html || { echo "ERROR: results/index.html missing"; exit 1; }
          grep -q "<table" results/index.html || { echo "ERROR: no results table in results/index.html"; exit 1; }
          grep -q "Today's Pick Status" results/index.html || { echo "ERROR: live pick status block missing"; exit 1; }
          echo "Recap and results look good."

      - name: Commit and push if changed
        run: |
          git config user.name "lydia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add results/ recaps/ data/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily recap $(TZ='America/New_York' date +%F)"
            git pull --rebase
            git push
          fi
