name: Daily recap and grading

on:
  schedule:
    - cron: "35 11 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Date to recap and grade in YYYY-MM-DD format"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: daily-recap
  cancel-in-progress: false

jobs:
  recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve recap date
        id: recap_date
        shell: bash
        run: |
          echo "UTC:"
          date -u
          echo "Eastern:"
          TZ="America/New_York" date

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DATE_INPUT="${{ github.event.inputs.date }}"

            if ! [[ "$DATE_INPUT" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "ERROR: Manual runs require a valid date in YYYY-MM-DD format."
              exit 1
            fi
          else
            DATE_INPUT=$(TZ="America/New_York" date -d "yesterday" +%F)
          fi

          echo "date=$DATE_INPUT" >> "$GITHUB_OUTPUT"
          echo "Resolved recap date: $DATE_INPUT"

      - name: Normalize public truth and model ownership
        run: node scripts/normalize-public-truth.js

      - name: Grade selected date picks
        run: node scripts/grade-results.js "${{ steps.recap_date.outputs.date }}"

      - name: Generate true-game recap
        run: node scripts/generate-recap.js "${{ steps.recap_date.outputs.date }}"

      - name: Grade full-slate calibration ledger
        run: node scripts/grade-calibration.js "${{ steps.recap_date.outputs.date }}"

      - name: Generate learning summary
        run: node scripts/generate-learning-summary.js --date "${{ steps.recap_date.outputs.date }}"

      - name: Generate LyDia Coach
        run: node scripts/generate-coach.js

      - name: Refresh LyDia Research Desk
        run: node scripts/generate-research-desk.js

      - name: Normalize public shell and head tags
        run: node scripts/normalize-public-shell.js

      - name: Keep live results block on Results page
        run: |
          node scripts/dedupe-clv.js
          node scripts/inject-live-results.js

      - name: Verify recap, learning, Coach, and research generated
        shell: bash
        run: |
          DATE_INPUT="${{ steps.recap_date.outputs.date }}"

          test -f "results/index.html" || { echo "ERROR: results/index.html missing"; exit 1; }
          grep -q "<table" "results/index.html" || { echo "ERROR: no results table in results/index.html"; exit 1; }
          grep -q "Today's Pick Status" "results/index.html" || { echo "ERROR: live pick status block missing"; exit 1; }

          test -f "recaps/$DATE_INPUT.html" || { echo "ERROR: recap missing for $DATE_INPUT"; exit 1; }
          test -f "data/learning/$DATE_INPUT.json" || { echo "ERROR: learning summary missing for $DATE_INPUT"; exit 1; }
          test -f "learning/index.html" || { echo "ERROR: learning/index.html missing"; exit 1; }
          test -f "data/learning-summary.json" || { echo "ERROR: current learning summary missing"; exit 1; }

          node -e "
            const fs = require('fs');
            const x = JSON.parse(fs.readFileSync('data/learning-summary.json', 'utf8'));
            if (!x.coach) throw new Error('Coach object missing from learning summary');
            console.log('Coach:', x.coach.status, 'Days:', x.coach.current_model_days, 'Picks:', x.coach.current_model_picks);
          "

          test -f "articles/index.html" || { echo "ERROR: Research Desk page missing"; exit 1; }
          test -f "data/research-desk.json" || { echo "ERROR: Research Desk data missing"; exit 1; }

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail
          DATE_INPUT="${{ steps.recap_date.outputs.date }}"

          git config user.name "lydia-bot"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Daily recap, learning and research $DATE_INPUT"

          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Working tree became dirty after commit."
            git status --short
            exit 1
          fi

          git pull --rebase origin "${GITHUB_REF_NAME}"

          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Working tree is dirty after rebase."
            git status --short
            exit 1
          fi

          git push origin "HEAD:${GITHUB_REF_NAME}"
