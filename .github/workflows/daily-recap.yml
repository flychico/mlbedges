name: Daily recap

on:
  schedule:
    # 11:00 UTC = 6/7am US Eastern — after all West Coast games finish
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate yesterday's recap
        run: node scripts/generate-recap.js

      - name: Commit and push if changed
        run: |
          git config user.name "recap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add recaps/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily recap $(date -u +%F)"
            git push
          fi
