name: Refresh prop and totals lines

# Manual, safe: re-captures K-prop and totals lines + projections for today.
# Touches ONLY data/k-props/ and data/totals/ — never picks, previews, or results.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-lines
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Capture strikeout prop lines + projections
        run: node scripts/update-k-props.js

      - name: Capture totals lines + projections
        run: node scripts/update-totals.js

      - name: Commit and push if changed
        run: |
          git config user.name "lydia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/k-props/ data/totals/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh prop and totals lines $(TZ=America/New_York date +%F-%H%M)"
            git pull --rebase
            git push
          fi
