name: Site maintenance cleanup

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-maintenance
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove invalid generated artifacts
        run: node scripts/site-health-cleanup.js --fix

      - name: Verify public pages are clean
        run: node scripts/assert-public-clean.js

      - name: Commit cleanup if changed
        run: |
          git config user.name "lydia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add previews/ data/ sitemap.xml
          git add -u
          if git diff --cached --quiet; then
            echo "No cleanup changes to commit."
          else
            git commit -m "Clean generated site artifacts"
            git pull --rebase
            git push
          fi
