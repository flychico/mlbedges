<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Member Brief — LyDia</title>
<meta name="description" content="LyDia's Daily Member Brief organizes official picks, Lab Score, pitcher edges, bullpen flags, and market notes.">
<link rel="canonical" href="https://mlbedges.com/member-brief/">
<link rel="stylesheet" href="/css/style.css">
<style>
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin:16px 0 22px}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi .label{font-size:.76rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.kpi .value{font-size:1.35rem;font-weight:800}
.brief-card{margin-bottom:14px}.brief-line{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:8px 0 10px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-top:10px}
.metric-box{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.metric-box .label{color:var(--text-dim);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
.metric-box .value{font-size:1.15rem;font-weight:800;font-variant-numeric:tabular-nums}.read{margin-top:10px;font-size:.88rem;color:var(--text-dim)}
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
<p class="eyebrow">LyDia's Lab</p>
<h1>Daily Member Brief</h1>
<p class="subtitle">One morning view of the card: official picks, Lab Score, pitcher edges, bullpen flags, and market notes.</p>

<div class="field" style="max-width:220px">
<label for="date-pick">Date</label>
<input type="date" id="date-pick">
</div>
<p>
<button onclick="shiftDay(0)">Today</button>
<button class="secondary" onclick="shiftDay(-1)">Yesterday</button>
<button class="secondary" onclick="loadBrief()">Refresh</button>
</p>

<div id="status" class="loading">Loading member brief…</div>
<div id="kpis" class="kpis"></div>
<div id="summary"></div>
<div id="official"></div>
<div id="watch"></div>
<div id="passes"></div>
</main>
<footer id="footer"></footer>
<script src="/js/app.js"></script>
<script>
renderNav("/tools/"); renderFooter();

const datePick=document.getElementById("date-pick");
datePick.value=localISODate(new Date());
datePick.addEventListener("change",loadBrief);
loadBrief();

function localISODate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function shiftDay(n){const d=new Date();d.setDate(d.getDate()+n);datePick.value=localISODate(d);loadBrief();}
function pct(v){return typeof v==="number"?(v*100).toFixed(1)+"%":"—";}
function edge(v){return typeof v==="number"?(v>=0?"+":"")+(v*100).toFixed(1)+"%":"—";}
function odds(v){return typeof v==="number"?Odds.fmtAm(v):"—";}

async function loadBrief(){
 const date=datePick.value;
 const els=["status","kpis","summary","official","watch","passes"].reduce((o,id)=>(o[id]=document.getElementById(id),o),{});
 els.status.innerHTML='<div class="loading">Loading member brief…</div>';
 els.kpis.innerHTML=els.summary.innerHTML=els.official.innerHTML=els.watch.innerHTML=els.passes.innerHTML="";
 let data=null;
 const urls=date===localISODate(new Date())?[`/data/member-brief/today.json`,`/data/member-brief/${date}.json`]:[`/data/member-brief/${date}.json`];
 for(const url of urls){try{const res=await fetch(url,{cache:"no-store"});if(res.ok){data=await res.json();break;}}catch(e){}}
 if(!data||!Array.isArray(data.games)){
  els.status.innerHTML=`<div class="notice warn"><strong>No member brief data found for ${escapeHtml(date)}.</strong> Run Daily content to generate the brief JSON.</div>`;
  return;
 }
 els.status.innerHTML="";
 const games=data.games||[];
 const official=games.filter(g=>g.status==="official_pick");
 const watch=games.filter(g=>(g.status==="watchlist"||g.lab_score>=65)&&g.status!=="official_pick");
 const passes=games.filter(g=>g.status==="pass");
 els.kpis.innerHTML=`<div class="kpi"><div class="label">Games</div><div class="value">${games.length}</div><div class="small dim">${escapeHtml(data.date||date)}</div></div>
 <div class="kpi"><div class="label">Official picks</div><div class="value">${official.length}</div><div class="small dim">cleared full process</div></div>
 <div class="kpi"><div class="label">Top Lab Score</div><div class="value">${games.length?Math.max(...games.map(g=>g.lab_score||0)):"—"}</div><div class="small dim">highest setup</div></div>
 <div class="kpi"><div class="label">Market tracked</div><div class="value">${games.filter(g=>g.market&&g.market.best_price!==null).length}</div><div class="small dim">priced games</div></div>`;
 els.summary.innerHTML=`<div class="notice"><strong>Brief read:</strong> ${escapeHtml(data.summary||"Review official picks first, then watchlist and pass reasons.")}${data.generated_at?`<br><span class="small dim">Generated ${escapeHtml(data.generated_at)}</span>`:""}</div>`;
 els.official.innerHTML=section("Official Picks",official,"No official picks cleared the full threshold.");
 els.watch.innerHTML=section("High Lab Score Watchlist",watch,"No watchlist games.");
 els.passes.innerHTML=section("Pass / No Clear Setup",passes.slice(0,12),"No pass notes available.");
}
function section(title,items,empty){return `<h2>${escapeHtml(title)}</h2>`+(items.length?items.map(renderCard).join(""):`<div class="notice">${escapeHtml(empty)}</div>`);}
function renderCard(g){
 const market=g.market||{},pitcher=g.pitcher_edge||{},bullpen=g.bullpen||{};
 const cls=g.status==="official_pick"?"pos":"neutral";
 return `<div class="card brief-card"><h3>${escapeHtml(g.game||"")}</h3><p class="dim small">${escapeHtml(g.time||"")}</p>
 <div class="brief-line"><span class="badge ${cls}">${labelStatus(g.status)}</span><span><b>LyDia side:</b> ${escapeHtml(g.pick_team||"—")}</span><span><b>Lab Score:</b> ${g.lab_score??"—"}/100</span></div>
 <div class="metric-grid">
 <div class="metric-box"><div class="label">Model probability</div><div class="value">${pct(g.model_probability)}</div></div>
 <div class="metric-box"><div class="label">Market probability</div><div class="value">${pct(market.no_vig_probability)}</div></div>
 <div class="metric-box"><div class="label">Model vs market</div><div class="value">${edge(g.edge)}</div></div>
 <div class="metric-box"><div class="label">Current price</div><div class="value">${odds(market.best_price)}</div></div>
 <div class="metric-box"><div class="label">Pitcher edge</div><div class="value">${escapeHtml(pitcher.team||"—")}</div></div>
 <div class="metric-box"><div class="label">Bullpen read</div><div class="value">${escapeHtml(bullpen.label||"—")}</div></div>
 </div><div class="read">${escapeHtml(g.read||g.pass_reason||"")}</div></div>`;
}
function labelStatus(s){if(s==="official_pick")return"Official pick";if(s==="watchlist")return"Watchlist";if(s==="pass")return"Pass";return"Research";}
</script>
</body>
</html>
