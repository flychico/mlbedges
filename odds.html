<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Odds — LyDia</title>
<meta name="description" content="Live MLB moneyline odds from major US sportsbooks with best-price highlighting, implied probabilities, and no-vig fair lines.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9918;</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1>Live MLB Odds</h1>
  <p class="subtitle">Moneylines from US sportsbooks, with best-price highlighting, no-vig fair odds, and market vig per game.</p>

  <div class="card" id="key-card">
    <h3>API key</h3>
    <p>This page uses <a href="https://the-odds-api.com" target="_blank" rel="noopener">The Odds API</a> (free tier: 500 requests/month). Paste your key once — it's saved in your browser only.</p>
    <div class="field" style="max-width:420px; margin-top:10px">
      <label for="api-key">The Odds API key</label>
      <input type="password" id="api-key" placeholder="Your API key">
    </div>
    <button onclick="saveKeyAndLoad()">Save & Load Odds</button>
    <button class="secondary" onclick="ApiKey.clear(); location.reload()">Clear key</button>
  </div>

  <div id="status"></div>
  <div id="board"></div>
</main>
<footer id="footer"></footer>
<script src="js/app.js"></script>
<script>
renderNav("odds.html"); renderFooter();

const statusEl = document.getElementById("status");
const boardEl = document.getElementById("board");

document.getElementById("api-key").value = ApiKey.get();
if (ApiKey.get()) loadOdds();

function saveKeyAndLoad() {
  const v = document.getElementById("api-key").value.trim();
  if (!v) { statusEl.innerHTML = `<div class="notice warn">Please enter an API key.</div>`; return; }
  ApiKey.set(v);
  loadOdds();
}

async function loadOdds() {
  statusEl.innerHTML = `<div class="loading">Loading MLB odds…</div>`;
  boardEl.innerHTML = "";
  const url = `https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${encodeURIComponent(ApiKey.get())}&regions=us&markets=h2h&oddsFormat=american`;
  let res, games;
  try {
    res = await fetch(url);
  } catch (e) {
    statusEl.innerHTML = `<div class="notice warn">Network error reaching The Odds API. Check your connection and try again.</div>`;
    return;
  }
  if (!res.ok) {
    const msg = res.status === 401 ? "Invalid API key." :
                res.status === 429 ? "Request quota exceeded for this key." :
                `API error (HTTP ${res.status}).`;
    statusEl.innerHTML = `<div class="notice warn">${msg}</div>`;
    return;
  }
  games = await res.json();
  const remaining = res.headers.get("x-requests-remaining");
  statusEl.innerHTML = `<div class="notice">Loaded <strong>${games.length}</strong> upcoming games.
    ${remaining !== null ? `API requests remaining this month: <strong>${escapeHtml(remaining)}</strong>.` : ""}
    <button class="secondary" style="margin-left:10px;padding:4px 12px" onclick="loadOdds()">Refresh</button></div>`;
  if (!games.length) {
    boardEl.innerHTML = `<div class="notice">No upcoming MLB games returned — try again closer to game day.</div>`;
    return;
  }
  boardEl.innerHTML = games.map(renderGame).join("");
}

function renderGame(g) {
  const home = g.home_team, away = g.away_team;
  const start = new Date(g.commence_time).toLocaleString([], { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });

  // Collect each book's h2h prices
  const rows = [];
  for (const bk of g.bookmakers || []) {
    const m = (bk.markets || []).find(m => m.key === "h2h");
    if (!m) continue;
    const oAway = m.outcomes.find(o => o.name === away);
    const oHome = m.outcomes.find(o => o.name === home);
    if (!oAway || !oHome) continue;
    rows.push({ book: bk.title, away: oAway.price, home: oHome.price });
  }
  if (!rows.length) return "";

  // Best price = highest decimal payout
  const bestAway = Math.max(...rows.map(r => Odds.amToDec(r.away)));
  const bestHome = Math.max(...rows.map(r => Odds.amToDec(r.home)));

  // Market consensus: average implied probs, then de-vig
  const avgAway = rows.reduce((s, r) => s + Odds.amToProb(r.away), 0) / rows.length;
  const avgHome = rows.reduce((s, r) => s + Odds.amToProb(r.home), 0) / rows.length;
  const tot = avgAway + avgHome;
  const fairAway = avgAway / tot, fairHome = avgHome / tot, vig = tot - 1;

  const tableRows = rows.map(r => {
    const aBest = Odds.amToDec(r.away) === bestAway ? " best-odds" : "";
    const hBest = Odds.amToDec(r.home) === bestHome ? " best-odds" : "";
    return `<tr>
      <td>${escapeHtml(r.book)}</td>
      <td class="num${aBest}">${Odds.fmtAm(r.away)}</td>
      <td class="num${hBest}">${Odds.fmtAm(r.home)}</td>
      <td class="num dim">${Odds.fmtPct(Odds.amToProb(r.away))}</td>
      <td class="num dim">${Odds.fmtPct(Odds.amToProb(r.home))}</td>
    </tr>`;
  }).join("");

  return `<div class="card game-card">
    <div class="game-head">
      <span class="matchup">${escapeHtml(away)} @ ${escapeHtml(home)}</span>
      <span class="dim small">${start}</span>
    </div>
    <table>
      <thead><tr>
        <th>Book</th>
        <th class="num">${escapeHtml(away)}</th>
        <th class="num">${escapeHtml(home)}</th>
        <th class="num">Imp. % (away)</th>
        <th class="num">Imp. % (home)</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="result-box small">
      No-vig fair line (market consensus):
      <strong>${escapeHtml(away)} ${Odds.fmtAm(Odds.probToAm(fairAway))}</strong> (${Odds.fmtPct(fairAway)}) /
      <strong>${escapeHtml(home)} ${Odds.fmtAm(Odds.probToAm(fairHome))}</strong> (${Odds.fmtPct(fairHome)})
      &nbsp;·&nbsp; Avg vig: <span class="${vig > 0.05 ? "neg-text" : "pos-text"}">${Odds.fmtPct(vig)}</span>
      &nbsp;·&nbsp; Green cells = best available price.
    </div>
  </div>`;
}
</script>
</body>
</html>
