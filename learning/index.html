<meta name="description" content="LyDia learning summary: what the model learned from graded moneyline picks, market movement, pitcher signals, bullpen signals, and results.">
<link rel="canonical" href="https://lydiaslab.com/learning/">
<link rel="stylesheet" href="/css/style.css">
<style>
.controls { display:flex; gap:10px; align-items:end; flex-wrap:wrap; margin-bottom:16px; }
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin:16px 0 22px; }
.kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.kpi .label { font-size:.76rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; }
.kpi .value { font-size:1.35rem; font-weight:800; }
.finding { margin-bottom:12px; }
.metric-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr)); gap:10px; margin-top:10px; }
.metric-box { background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius); padding:12px; }
.metric-box .label { color:var(--text-dim); font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
.metric-box .value { font-size:1.1rem; font-weight:800; font-variant-numeric:tabular-nums; }
.learning-row { margin:10px 0; padding-bottom:10px; border-bottom:1px solid var(--border); }
.learning-row:last-child { border-bottom:0; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <p class="eyebrow">LyDia's Lab</p>
  <h1>Learning Summary</h1>
  <p class="subtitle">A process review of graded moneyline picks, market movement, pitcher signals, bullpen signals, and threshold discipline.</p>

  <div id="status" class="loading">Loading learning summary...</div>
  <div id="headline"></div>
  <div id="kpis" class="kpis"></div>
  <div id="findings"></div>
  <div id="buckets"></div>
</main>
<footer id="footer"></footer><script src="/js/app.js"></script>
<script>
renderNav("/articles/"); renderFooter();

loadLearning();

async function loadLearning() {
  const statusEl = document.getElementById("status");
  const headlineEl = document.getElementById("headline");
  const kpisEl = document.getElementById("kpis");
  const findingsEl = document.getElementById("findings");
  const bucketsEl = document.getElementById("buckets");

  let data = null;
  try {
    const res = await fetch(`/data/learning-summary.json?v=${Date.now()}`, { cache: "no-store" });
    if (res.ok) data = await res.json();
  } catch (e) {}

  if (!data || data.status !== "ready") {
    statusEl.className = "notice warn";
    statusEl.innerHTML = `<strong>No learning summary is available yet.</strong><br>Learning is generated after the daily grading workflow runs.`;
    return;
  }

  statusEl.innerHTML = "";
  headlineEl.innerHTML = `<div class="notice"><strong>${esc(data.headline || "Learning summary ready.")}</strong><br><span class="small dim">Generated ${friendlyTime(data.generated_at)}. Current official model: ${esc(data.current_official_model || "moneyline_only")}.</span></div>`;

  const day = data.day || {};
  const metrics = data.process_metrics || {};
  kpisEl.innerHTML = `
    <div class="kpi"><div class="label">Date reviewed</div><div class="value">${esc(data.latest_date || "-")}</div><div class="small dim">${data.days_reviewed || 0} day${data.days_reviewed === 1 ? "" : "s"} in file</div></div>
    <div class="kpi"><div class="label">Moneyline record</div><div class="value">${esc(day.moneyline_record || "0-0")}</div><div class="small dim">${pct(day.moneyline_win_rate)} win rate</div></div>
    <div class="kpi"><div class="label">Avg model prob</div><div class="value">${pct(metrics.average_model_probability)}</div><div class="small dim">graded moneyline set</div></div>
    <div class="kpi"><div class="label">Avg Lab Score</div><div class="value">${num(metrics.average_lab_score)}</div><div class="small dim">setup quality, not probability</div></div>
    <div class="kpi"><div class="label">Protected by gate</div><div class="value">${metrics.protected_by_probability_gate_count || 0}</div><div class="small dim">high Lab, low probability</div></div>
    <div class="kpi"><div class="label">CLV tracked</div><div class="value">${clvTotal(metrics.clv_counts)}</div><div class="small dim">needs market snapshots</div></div>
  `;

  const findings = data.findings || [];
  findingsEl.innerHTML = `<h2>What LyDia learned</h2>` + findings.map(f => `
    <div class="card finding">
      <h3>${esc(f.title || "Finding")}</h3>
      <p>${esc(f.read || "")}</p>
    </div>
  `).join("");

  const cal = data.calibration || {};
  const calHtml = cal.status === "ready" ? `
    <h2>Full-slate calibration</h2>
    <div class="card" style="margin-bottom:14px">
      <p class="dim small">Every analyzed game — official picks, value watches, watchlist, and passes — is graded nightly into a learning-only shadow ledger. This measures whether the model's probabilities are honest and what the games below the official gates would have returned. It is not the public record.</p>
      <p><strong>${cal.games_graded}</strong> games graded · Brier score <strong>${cal.brier_score}</strong> <span class="dim small">(lower is better; 0.25 = coin flip)</span></p>
      <table>
        <thead><tr><th>Model probability</th><th class="num">Games</th><th class="num">Expected win%</th><th class="num">Actual win%</th></tr></thead>
        <tbody>${(cal.buckets || []).map(b => `<tr><td>${esc(b.range)}</td><td class="num">${b.games}</td><td class="num">${(b.expected_win_rate * 100).toFixed(0)}%</td><td class="num">${(b.actual_win_rate * 100).toFixed(0)}%</td></tr>`).join("")}</tbody>
      </table>
      ${cal.shadow_model && cal.shadow_model.status === "ready" ? `
      <div style="margin-top:12px;padding:10px;border:1px solid var(--border);border-radius:8px">
        <b>Model A/B — official v2 vs shadow v3</b> <span class="dim small">(v3: skill-based pitcher input + offense form)</span><br>
        <span class="small">${cal.shadow_model.games} games · Brier v2 <b>${cal.shadow_model.brier_v2}</b> vs v3 <b>${cal.shadow_model.brier_v3}</b> → <b>${cal.shadow_model.leader}</b> leads · ${cal.shadow_model.disagreements} disagreement${cal.shadow_model.disagreements === 1 ? "" : "s"}${cal.shadow_model.disagreements ? `, v3 right in ${cal.shadow_model.v3_wins_disagreements}` : ""}</span>
      </div>` : ""}
      <table style="margin-top:10px">
        <thead><tr><th>Tier</th><th class="num">Record</th><th class="num">Shadow units (flat 1u)</th></tr></thead>
        <tbody>${Object.entries(cal.shadow_by_status || {}).map(([k, v]) => `<tr><td>${esc(k.replace(/_/g, " "))}</td><td class="num">${v.wins}-${v.games - v.wins}</td><td class="num">${v.units > 0 ? "+" : ""}${v.units}</td></tr>`).join("")}</tbody>
      </table>
    </div>` : "";

  bucketsEl.innerHTML = calHtml + `
    <h2>Review buckets</h2>
    ${bucket("Strong official", (data.buckets || {}).strong_official || [], "Picks that cleared the strict 72% model probability and 80 Lab Score gates.")}
    ${bucket("Protected by probability gate", (data.buckets || {}).protected_by_probability_gate || [], "High setup quality, but model probability below the official-pick gate. These should stay value watch.")}
    ${bucket("High bullpen risk", (data.buckets || {}).high_bullpen_risk || [], "Official moneyline picks with meaningful bullpen caution.")}
    ${bucket("Pitcher conflicts", (data.buckets || {}).pitcher_conflicts || [], "Official moneyline picks where the starting pitcher edge conflicted with the model side.")}
  `;
}

function bucket(title, rows, empty) {
  return `<div class="card" style="margin-bottom:14px">
    <h3>${esc(title)}</h3>
    <p class="dim small">${esc(empty)}</p>
    ${rows.length ? rows.slice(0, 12).map(row).join("") : `<div class="notice">No items in this bucket.</div>`}
  </div>`;
}

function row(x) {
  return `<div class="learning-row">
    <strong>${esc(x.pick || "-")}</strong> <span class="dim">in ${esc(x.game || "")}</span>
    <div class="metric-grid">
      <div class="metric-box"><div class="label">Result</div><div class="value">${esc(x.result || "-")}</div></div>
      <div class="metric-box"><div class="label">Model probability</div><div class="value">${pct(x.model_probability)}</div></div>
      <div class="metric-box"><div class="label">Lab Score</div><div class="value">${num(x.lab_score)}</div></div>
      <div class="metric-box"><div class="label">Raw edge</div><div class="value">${pct(x.raw_edge)}</div></div>
      <div class="metric-box"><div class="label">CLV</div><div class="value small">${esc(x.clv_result || "not_tracked")}</div></div>
      <div class="metric-box"><div class="label">Lesson</div><div class="value small">${esc(x.lesson_tag || "-")}</div></div>
    </div>
  </div>`;
}

function pct(v) {
  return typeof v === "number" ? (v * 100).toFixed(1) + "%" : "-";
}
function num(v) {
  return typeof v === "number" ? String(Math.round(v * 10) / 10) : "-";
}
function clvTotal(obj) {
  if (!obj) return 0;
  return Object.values(obj).reduce((s, v) => s + Number(v || 0), 0);
}
function friendlyTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleString("en-US", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit", timeZone:"America/New_York", timeZoneName:"short" });
}
</script>
</body>
</html>
