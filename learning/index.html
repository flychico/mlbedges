<meta name="description" content="LyDia learning summary: what the model learned from graded moneyline picks, market movement, pitcher signals, bullpen signals, and results.">
<link rel="canonical" href="https://lydiaslab.com/learning/">
<link rel="stylesheet" href="/css/style.css">
<style>
.controls { display:flex; gap:10px; align-items:end; flex-wrap:wrap; margin-bottom:16px; }
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin:16px 0 22px; }
.kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.kpi .label { font-size:.76rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; }
.kpi .value { font-size:1.35rem; font-weight:800; }
.finding { margin-bottom:12px; }
.metric-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr)); gap:10px; margin-top:10px; }
.metric-box { background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius); padding:12px; }
.metric-box .label { color:var(--text-dim); font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
.metric-box .value { font-size:1.1rem; font-weight:800; font-variant-numeric:tabular-nums; }
.learning-row { margin:10px 0; padding-bottom:10px; border-bottom:1px solid var(--border); }
.learning-row:last-child { border-bottom:0; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <p class="eyebrow">LyDia's Lab</p>
  <h1>Learning Summary</h1>
  <p class="subtitle">A process review of graded moneyline picks, market movement, pitcher signals, bullpen signals, and threshold discipline.</p>

  <div id="status" class="loading">Loading learning summary...</div>
  <div id="headline"></div>
  <div id="kpis" class="kpis"></div>
  <div id="findings"></div>
  <div id="buckets"></div>
</main>
<footer id="footer"></footer><script src="/js/app.js"></script>
<script>
function esc(v){ return escapeHtml(String(v ?? "")); }
renderNav("/articles/"); renderFooter();

loadLearning();

async function loadLearning() {
  const statusEl = document.getElementById("status");
  const headlineEl = document.getElementById("headline");
  const kpisEl = document.getElementById("kpis");
  const findingsEl = document.getElementById("findings");
  const bucketsEl = document.getElementById("buckets");

  let data = null;
  try {
    const res = await fetch(`/data/learning-summary.json?v=${Date.now()}`, { cache: "no-store" });
    if (res.ok) data = await res.json();
  } catch (e) {}

  if (!data || data.status !== "ready") {
    statusEl.className = "notice warn";
    statusEl.innerHTML = `<strong>No learning summary is available yet.</strong><br>Learning is generated after the daily grading workflow runs.`;
    return;
  }

  statusEl.innerHTML = "";
  headlineEl.innerHTML = `<div class="notice"><strong>${esc(data.headline || "Learning summary ready.")}</strong><br><span class="small dim">Generated ${friendlyTime(data.generated_at)}. Current official model: ${esc(data.current_official_model || "moneyline_only")}.</span></div>`;

  const day = data.day || {};
  const metrics = data.process_metrics || {};
  kpisEl.innerHTML = `
    <div class="kpi"><div class="label">Date reviewed</div><div class="value">${esc(data.latest_date || "-")}</div><div class="small dim">${data.days_reviewed || 0} day${data.days_reviewed === 1 ? "" : "s"} in file</div></div>
    <div class="kpi"><div class="label">Moneyline record</div><div class="value">${esc(day.moneyline_record || "0-0")}</div><div class="small dim">${pct(day.moneyline_win_rate)} win rate</div></div>
    <div class="kpi"><div class="label">Avg model prob</div><div class="value">${pct(metrics.average_model_probability)}</div><div class="small dim">graded moneyline set</div></div>
    <div class="kpi"><div class="label">Avg Lab Score</div><div class="value">${num(metrics.average_lab_score)}</div><div class="small dim">setup quality, not probability</div></div>
    <div class="kpi"><div class="label">Protected by gate</div><div class="value">${metrics.protected_by_probability_gate_count || 0}</div><div class="small dim">high Lab, low probability</div></div>
    <div class="kpi"><div class="label">CLV tracked</div><div class="value">${clvTotal(metrics.clv_counts)}</div><div class="small dim">needs market snapshots</div></div>
  `;

  const findings = data.findings || [];
  findingsEl.innerHTML = `<h2>What LyDia learned</h2>` + findings.map(f => `
    <div class="card finding">
      <h3>${esc(f.title || "Finding")}</h3>
      <p>${esc(f.read || "")}</p>
    </div>
  `).join("");

  const cal = data.calibration || {};
  // Lab Rating distribution — where do ratings cluster and why
  let distHtml = "";
  try {
    const csv = await fetch("/data/calibration/calibration_log.csv?v=" + Date.now(), { cache: "no-store" }).then(r => r.ok ? r.text() : null);
    if (csv) {
      // CSV has a quoted matchup field — split carefully
      const parseRow = l => {
        const m = l.match(/^([^,]*),([^,]*),("(?:[^"]|"")*"|[^,]*),("(?:[^"]|"")*"|[^,]*),([^,]*),([^,]*),([^,]*),([^,]*),([^,]*),([^,]*),(.*)$/);
        return m ? { date: m[1], pk: m[2], matchup: m[3].replace(/^"|"$/g, ""), side: m[4].replace(/^"|"$/g, ""), status: m[5], prob: Number(m[6]), lab: Number(m[8]), result: m[10], score: m[11] } : null;
      };
      window._calGames = csv.trim().split("\n").slice(1).map(parseRow).filter(Boolean);
      const rows = csv.trim().split("\n").slice(1).map(l => l.split(","));
      const labs = rows.map(r => ({ lab: Number(r[7]), status: r[4] })).filter(x => Number.isFinite(x.lab));
      if (labs.length >= 10) {
        const buckets = new Array(10).fill(0);
        labs.forEach(x => buckets[Math.min(9, Math.floor(x.lab / 10))]++);
        const maxB = Math.max(...buckets);
        const byStatus = {};
        labs.forEach(x => (byStatus[x.status] = byStatus[x.status] || []).push(x.lab));
        const avg = a => (a.reduce((p, c) => p + c, 0) / a.length / 10).toFixed(1);
        distHtml = `<h2>Lab Rating distribution</h2><div class="card" style="margin-bottom:14px">
          <p class="dim small">${labs.length} analyzed games. Ratings cluster in the 7.0–7.9 band because the edge and market components saturate quickly — any market edge above 8% already earns maximum edge points, so the pitcher matchup is usually what separates a 7 from an 8.</p>
          ${buckets.map((n, i) => `<div style="display:flex;align-items:center;gap:8px;font-size:.82rem"><span style="width:52px" class="dim">${(i).toFixed(0)}.0–${i}.9</span><div style="flex:1;background:var(--bg-elev);border-radius:4px;height:14px"><div style="width:${maxB ? (n / maxB * 100) : 0}%;height:100%;background:var(--accent2);border-radius:4px"></div></div><span class="dim small" style="width:22px;text-align:right">${n}</span></div>`).join("")}
          <table style="margin-top:10px"><thead><tr><th>Tier</th><th class="num">Games</th><th class="num">Avg rating</th></tr></thead><tbody>
          ${["official_pick", "value_watch", "watchlist", "pass"].filter(k => byStatus[k]).map(k => `<tr><td>${k.replace(/_/g, " ")}</td><td class="num">${byStatus[k].length}</td><td class="num"><b>${avg(byStatus[k])}</b>/10</td></tr>`).join("")}</tbody></table>
        </div>`;
      }
    }
  } catch (e) {}

  const gameLine = g => `<div class="small" style="padding:3px 0;border-top:1px solid var(--border)">${g.result === "W" ? "✅" : g.result === "L" ? "❌" : "⏸"} ${esc(g.date.slice(5))} · ${esc(g.matchup)} — ${esc(g.side)} ${(g.prob * 100).toFixed(0)}%${Number.isFinite(g.lab) ? ` · Lab ${(g.lab / 10).toFixed(1)}` : ""}${g.score ? ` · final ${esc(g.score)}` : ""}</div>`;
  const gamesDetails = (label, games) => games.length ? `<details style="margin:2px 0 4px"><summary class="small dim" style="cursor:pointer">${label} — show ${games.length} game${games.length === 1 ? "" : "s"}</summary>${games.map(gameLine).join("")}</details>` : "";
  const G = window._calGames || [];
  const inBucket = range => { const [lo, hi] = range.replace("%", "").split("-").map(Number); return G.filter(g => Number.isFinite(g.prob) && g.prob * 100 >= lo && g.prob * 100 < (hi === 100 ? 101 : hi) && (g.result === "W" || g.result === "L")); };

  const calHtml = cal.status === "ready" ? `
    <h2>Full-slate calibration</h2>
    <div class="card" style="margin-bottom:14px">
      <p class="dim small">Every analyzed game — official picks, value watches, watchlist, and passes — is graded nightly into a learning-only shadow ledger. This measures whether the model's probabilities are honest and what the games below the official gates would have returned. It is not the public record.</p>
      <p><strong>${cal.games_graded}</strong> games graded · Brier score <strong>${cal.brier_score}</strong> <span class="dim small">(lower is better; 0.25 = coin flip)</span></p>
      <table>
        <thead><tr><th>Model probability</th><th class="num">Games</th><th class="num">Expected win%</th><th class="num">Actual win%</th></tr></thead>
        <tbody>${(cal.buckets || []).map(b => `<tr><td>${esc(b.range)}</td><td class="num">${b.games}</td><td class="num">${(b.expected_win_rate * 100).toFixed(0)}%</td><td class="num">${(b.actual_win_rate * 100).toFixed(0)}%</td></tr><tr><td colspan="4" style="padding:0 6px">${gamesDetails("games in " + b.range, inBucket(b.range))}</td></tr>`).join("")}</tbody>
      </table>
      ${cal.shadow_model && cal.shadow_model.status === "ready" ? `
      <div style="margin-top:12px;padding:10px;border:1px solid var(--border);border-radius:8px">
        <b>Model A/B — official v2 vs shadow v3</b> <span class="dim small">(v3: skill-based pitcher input + offense form)</span><br>
        <span class="small">${cal.shadow_model.games} games · Brier v2 <b>${cal.shadow_model.brier_v2}</b> vs v3 <b>${cal.shadow_model.brier_v3}</b> → <b>${cal.shadow_model.leader}</b> leads · ${cal.shadow_model.disagreements} disagreement${cal.shadow_model.disagreements === 1 ? "" : "s"}${cal.shadow_model.disagreements ? `, v3 right in ${cal.shadow_model.v3_wins_disagreements}` : ""}</span>
        <div id="ab-games"></div>
      </div>` : ""}
      ${cal.attribution ? (cal.attribution.status === "ready" ? `
      <div style="margin-top:12px;padding:10px;border:1px solid var(--border);border-radius:8px">
        <b>Metric attribution — what actually separates winners from losers</b>
        <p class="dim small" style="margin:4px 0 8px">${esc(cal.attribution.note || "")} n=${cal.attribution.games}.</p>
        <table><thead><tr><th>Factor</th><th class="num">Low-band win%</th><th class="num">Mid</th><th class="num">High-band win%</th><th class="num">Spread</th></tr></thead><tbody>
        ${cal.attribution.factors.map(f => `<tr><td>${esc(f.factor)}</td>${f.tertiles.map(t => `<td class="num">${(t.win_rate * 100).toFixed(0)}% <span class="dim small">(${t.games})</span></td>`).join("")}<td class="num ${f.spread >= 0.08 ? "pos-text" : f.spread <= -0.08 ? "neg-text" : "dim"}"><b>${f.spread > 0 ? "+" : ""}${(f.spread * 100).toFixed(0)}</b></td></tr>`).join("")}</tbody></table>
      </div>` : `
      <div style="margin-top:12px;padding:10px;border:1px dashed var(--border);border-radius:8px">
        <b>Metric attribution</b> <span class="dim small">— dormant until the sample can support it</span>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px"><div style="flex:1;background:var(--bg-elev);border-radius:6px;height:12px"><div style="width:${Math.min(100, (cal.attribution.games / cal.attribution.needed * 100)).toFixed(0)}%;height:100%;background:var(--accent2);border-radius:6px"></div></div><span class="small dim">${cal.attribution.games}/${cal.attribution.needed} games</span></div>
        <p class="dim small" style="margin:6px 0 0">When it wakes up: win rate by tertile for pitcher gap, K-BB% gap, offense form, bullpen fatigue, Lab Rating, and model probability — the evidence for re-weighting the model.</p>
      </div>`) : ""}
      ${cal.totals && cal.totals.status === "ready" ? `
      <div style="margin-top:12px;padding:10px;border:1px solid var(--border);border-radius:8px">
        <b>Totals projections — accuracy tracking</b>
        <p class="dim small" style="margin:4px 0 6px">${esc(cal.totals.note || "")}</p>
        <span class="small">${cal.totals.graded} games graded · bias <b>${cal.totals.bias > 0 ? "+" : ""}${cal.totals.bias}</b> runs · avg miss <b>${cal.totals.mae}</b> runs · lean record <b>${cal.totals.lean_record}</b> <span class="dim">(over ${cal.totals.over_lean_record}, under ${cal.totals.under_lean_record})</span></span>
      </div>` : ""}
            ${cal.kprops && cal.kprops.status === "ready" ? `
      <div style="margin-top:12px;padding:10px;border:1px solid var(--border);border-radius:8px">
        <b>Strikeout projections — accuracy tracking</b>
        <p class="dim small" style="margin:4px 0 6px">${esc(cal.kprops.note || "")}</p>
        <span class="small">${cal.kprops.graded} pitchers graded (${cal.kprops.with_projection} with projections) · bias <b>${cal.kprops.bias > 0 ? "+" : ""}${cal.kprops.bias}</b> Ks · avg miss <b>${cal.kprops.mae}</b> Ks · lean record <b>${cal.kprops.lean_record}</b> <span class="dim">(over ${cal.kprops.over_lean_record}, under ${cal.kprops.under_lean_record}, no-edge ${cal.kprops.no_lean})</span></span>
      </div>` : ""}
      <table style="margin-top:10px">
        <thead><tr><th>Tier</th><th class="num">Record</th><th class="num">Shadow units (flat 1u)</th></tr></thead>
        <tbody>${Object.entries(cal.shadow_by_status || {}).map(([k, v]) => `<tr><td>${esc(k.replace(/_/g, " "))}</td><td class="num">${v.wins}-${v.games - v.wins}</td><td class="num">${v.units > 0 ? "+" : ""}${v.units}</td></tr><tr><td colspan="3" style="padding:0 6px">${gamesDetails(k.replace(/_/g, " ") + " games", G.filter(g => g.status === k && (g.result === "W" || g.result === "L")))}</td></tr>`).join("")}</tbody>
      </table>
    </div>` : "";



  bucketsEl.innerHTML = distHtml + calHtml + `
    <h2>Review buckets</h2>
    ${bucket("Strong official", (data.buckets || {}).strong_official || [], "Picks that cleared the strict 72% model probability and 80 Lab Score gates.")}
    ${bucket("Protected by probability gate", (data.buckets || {}).protected_by_probability_gate || [], "High setup quality, but model probability below the official-pick gate. These should stay value watch.")}
    ${bucket("High bullpen risk", (data.buckets || {}).high_bullpen_risk || [], "Official moneyline picks with meaningful bullpen caution.")}
    ${bucket("Pitcher conflicts", (data.buckets || {}).pitcher_conflicts || [], "Official moneyline picks where the starting pitcher edge conflicted with the model side.")}
  `;

  // Name the A/B disagreement games — the ones that decide promotion
  try {
    const sh = await fetch("/data/calibration/shadow_v3_log.csv?v=" + Date.now(), { cache: "no-store" }).then(r => r.ok ? r.text() : null);
    const el = document.getElementById("ab-games");
    if (sh && el) {
      const byPk = {}; (window._calGames || []).forEach(g => byPk[g.date + "," + g.pk] = g);
      const dis = sh.trim().split("\n").slice(1).map(l => l.split(",")).filter(r => r.length >= 5 && (Number(r[2]) >= 0.5) !== (Number(r[3]) >= 0.5));
      if (dis.length) {
        el.innerHTML = `<details style="margin-top:6px"><summary class="small dim" style="cursor:pointer">show the ${dis.length} disagreement game${dis.length === 1 ? "" : "s"}</summary>` +
          dis.map(r => {
            const g = byPk[r[0] + "," + r[1]];
            const hw = Number(r[4]) === 1, p2h = Number(r[2]) >= 0.5, p3h = Number(r[3]) >= 0.5;
            const name = g ? g.matchup : "game " + r[1];
            const [away, home] = (g ? g.matchup.split(" @ ") : ["away", "home"]);
            const v2side = p2h ? home : away, v3side = p3h ? home : away, winner = hw ? home : away;
            const v3right = p3h === hw;
            return `<div class="small" style="padding:3px 0;border-top:1px solid var(--border)">${esc(r[0].slice(5))} · ${esc(name)} — v2: ${esc(v2side)} ${(Math.max(Number(r[2]), 1 - Number(r[2])) * 100).toFixed(0)}% · v3: ${esc(v3side)} ${(Math.max(Number(r[3]), 1 - Number(r[3])) * 100).toFixed(0)}% → <b>${esc(winner)}</b> won · ${v3right ? '<b class="pos-text">v3 right</b>' : '<b class="neg-text">v2 right</b>'}${g && Number.isFinite(g.lab) ? ` · Lab ${(g.lab / 10).toFixed(1)}` : ""}</div>`;
          }).join("") + `</details>`;
      }
    }
  } catch (e) {}

}

function bucket(title, rows, empty) {
  if (!rows || !rows.length) return ""; // empty buckets stay invisible — no broken-looking boxes

  return `<div class="card" style="margin-bottom:14px">
    <h3>${esc(title)}</h3>
    <p class="dim small">${esc(empty)}</p>
    ${rows.length ? rows.slice(0, 12).map(row).join("") : `<div class="notice">No items in this bucket.</div>`}
  </div>`;
}

function row(x) {
  return `<div class="learning-row">
    <strong>${esc(x.pick || "-")}</strong> <span class="dim">in ${esc(x.game || "")}</span>
    <div class="metric-grid">
      <div class="metric-box"><div class="label">Result</div><div class="value">${esc(x.result || "-")}</div></div>
      <div class="metric-box"><div class="label">Model probability</div><div class="value">${pct(x.model_probability)}</div></div>
      <div class="metric-box"><div class="label">Lab Score</div><div class="value">${num(x.lab_score)}</div></div>
      <div class="metric-box"><div class="label">Raw edge</div><div class="value">${pct(x.raw_edge)}</div></div>
      <div class="metric-box"><div class="label">CLV</div><div class="value small">${esc(x.clv_result || "not_tracked")}</div></div>
      <div class="metric-box"><div class="label">Lesson</div><div class="value small">${esc(x.lesson_tag || "-")}</div></div>
    </div>
  </div>`;
}

function pct(v) {
  return typeof v === "number" ? (v * 100).toFixed(1) + "%" : "-";
}
function num(v) {
  return typeof v === "number" ? String(Math.round(v * 10) / 10) : "-";
}
function clvTotal(obj) {
  if (!obj) return 0;
  return Object.values(obj).reduce((s, v) => s + Number(v || 0), 0);
}
function friendlyTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleString("en-US", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit", timeZone:"America/New_York", timeZoneName:"short" });
}
</script>
</body>
</html>
