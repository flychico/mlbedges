<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Recap — MLB Edges</title>
<meta name="description" content="Daily MLB recap: every final score, the biggest blowout, the closest finish, and what it means for the standings.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9918;</text></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
.controls { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; margin-bottom: 20px; }
.controls .field { margin-bottom: 0; }
.recap-game { border-left: 3px solid var(--accent2); padding-left: 14px; margin: 18px 0; }
.recap-game h3 { margin: 0 0 4px; }
.recap-game .scoreline { font-weight: 700; }
.recap-game p { color: var(--text); font-size: .95rem; margin-top: 4px; }
.roundup { font-size: 1.02rem; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1>Daily Recap</h1>
  <p class="subtitle">Every final from around the league, written up automatically from the box scores.</p>

  <div class="controls">
    <div class="field">
      <label for="date-pick">Date</label>
      <input type="date" id="date-pick">
    </div>
    <button onclick="shiftDay(-1)">Yesterday</button>
    <button class="secondary" onclick="shiftDay(0)">Today</button>
    <button class="secondary" onclick="copyMarkdown()" id="copy-btn" disabled>Copy as blog post (Markdown)</button>
  </div>

  <div id="status" class="loading">Loading results…</div>
  <div class="card" id="recap" hidden></div>
</main>
<footer id="footer"></footer>
<script src="js/app.js"></script>
<script>
renderNav("recaps.html"); renderFooter();

let markdownOut = "";
const datePick = document.getElementById("date-pick");
datePick.value = isoDate(-1); // default: yesterday
datePick.addEventListener("change", load);
load();

function isoDate(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function shiftDay(off) { datePick.value = isoDate(off); load(); }

function niceDate(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString([], { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}

async function load() {
  const statusEl = document.getElementById("status");
  const recapEl = document.getElementById("recap");
  const copyBtn = document.getElementById("copy-btn");
  statusEl.innerHTML = `<div class="loading">Loading results…</div>`;
  recapEl.hidden = true; copyBtn.disabled = true;
  const date = datePick.value;
  let sched;
  try {
    const res = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}&hydrate=linescore`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    sched = await res.json();
  } catch (e) {
    statusEl.innerHTML = `<div class="notice warn">Failed to load results (${escapeHtml(e.message)}).</div>`;
    return;
  }
  const games = (((sched.dates || [])[0]) || {}).games || [];
  const finals = games.filter(g => g.status.abstractGameState === "Final" && g.teams.away.score !== undefined);
  if (!finals.length) {
    statusEl.innerHTML = `<div class="notice">No completed games for ${niceDate(date)}${games.length ? " yet — check back after tonight's finals" : ""}.</div>`;
    return;
  }
  statusEl.innerHTML = "";
  const { html, md } = buildRecap(finals, date);
  recapEl.innerHTML = html;
  recapEl.hidden = false;
  markdownOut = md;
  copyBtn.disabled = false;
}

function marginPhrase(m) {
  if (m === 1) return "edged";
  if (m === 2) return "slipped past";
  if (m <= 4) return "beat";
  if (m <= 7) return "pulled away from";
  return "routed";
}

function gameFacts(g) {
  const a = g.teams.away, h = g.teams.home;
  const winner = a.score > h.score ? a : h;
  const loser = winner === a ? h : a;
  const margin = winner.score - loser.score;
  const ls = g.linescore || {};
  const innings = ls.currentInning || 9;
  // biggest single inning by the winner (4+ runs)
  let bigInning = null;
  for (const inn of ls.innings || []) {
    const side = winner === a ? "away" : "home";
    const runs = inn[side] && inn[side].runs;
    if (runs >= 4 && (!bigInning || runs > bigInning.runs)) bigInning = { runs, ord: inn.ordinalNum };
  }
  return { a, h, winner, loser, margin, innings, bigInning };
}

function recapSentence(g) {
  const { a, winner, loser, margin, innings, bigInning } = gameFacts(g);
  const where = winner === a ? "on the road" : "at home";
  let s = `The ${teamShort(winner.team.name)} ${marginPhrase(margin)} the ${teamShort(loser.team.name)} ${winner.score}–${loser.score} ${where}`;
  if (innings > 9) s += ` in ${innings} innings`;
  s += ".";
  if (bigInning) s += ` A ${bigInning.runs}-run ${bigInning.ord} broke the game open.`;
  const wr = winner.leagueRecord, lr = loser.leagueRecord;
  if (wr && lr) s += ` The win moves them to ${wr.wins}-${wr.losses}; the ${teamShort(loser.team.name)} fall to ${lr.wins}-${lr.losses}.`;
  return s;
}

function teamShort(name) {
  const two = ["Red Sox", "White Sox", "Blue Jays"].find(x => name.endsWith(x));
  if (two) return two;
  const parts = name.split(" ");
  return parts[parts.length - 1];
}

function buildRecap(finals, date) {
  const facts = finals.map(gameFacts);
  const nice = niceDate(date);
  const totalRuns = facts.reduce((s, f) => s + f.winner.score + f.loser.score, 0);
  const blow = facts.reduce((x, f) => f.margin > x.margin ? f : x, facts[0]);
  const close = facts.filter(f => f.margin === 1).length;
  const extras = facts.filter(f => f.innings > 9).length;

  const intro = `${finals.length} games went final on ${nice}, producing ${totalRuns} total runs. ` +
    `The biggest margin of the day belonged to the ${teamShort(blow.winner.team.name)}, who ${marginPhrase(blow.margin)} the ${teamShort(blow.loser.team.name)} by ${blow.margin}. ` +
    `${close ? `${close} game${close > 1 ? "s were" : " was"} decided by a single run` : "No one-run games"}${extras ? `, and ${extras} went to extra innings` : ""}.`;

  let html = `<h2>MLB Recap — ${escapeHtml(nice)}</h2><p class="roundup">${escapeHtml(intro)}</p>`;
  let md = `# MLB Recap — ${nice}\n\n${intro}\n`;

  for (const g of finals) {
    const { a, h } = gameFacts(g);
    const head = `${teamShort(a.team.name)} ${a.score}, ${teamShort(h.team.name)} ${h.score}`;
    const body = recapSentence(g);
    html += `<div class="recap-game"><h3 class="scoreline">${escapeHtml(head)}</h3><p>${escapeHtml(body)}</p></div>`;
    md += `\n## ${head}\n\n${body}\n`;
  }
  md += `\n---\n*Generated from official MLB data at mlbedges.com — odds, tools, and analysis for every game.*\n`;
  html += `<p class="dim small">Recaps are generated from official MLB box score data. Use the copy button above to repost as your daily blog.</p>`;
  return { html, md };
}

function copyMarkdown() {
  navigator.clipboard.writeText(markdownOut).then(() => {
    const b = document.getElementById("copy-btn");
    const t = b.textContent; b.textContent = "Copied!";
    setTimeout(() => b.textContent = t, 1500);
  });
}
</script>
</body>
</html>
