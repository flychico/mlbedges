<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games Dashboard — MLB Edges</title>
<meta name="description" content="Daily MLB games dashboard: scores, probable pitchers, team records, and market win probabilities for every matchup.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9918;</text></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
.controls { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; margin-bottom: 20px; }
.controls .field { margin-bottom: 0; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 24px; }
.kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.kpi .label { font-size: .78rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; }
.kpi .value { font-size: 1.35rem; font-weight: 700; margin-top: 2px; }
.kpi .sub { font-size: .8rem; color: var(--text-dim); }
.games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 14px; }
.gcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.gcard .time { font-size: .8rem; color: var(--text-dim); display: flex; justify-content: space-between; }
.teamline { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.teamline .tname { font-weight: 600; }
.teamline .rec { color: var(--text-dim); font-size: .82rem; }
.teamline .ml { font-variant-numeric: tabular-nums; font-weight: 700; min-width: 54px; text-align: right; }
.teamline .prob { color: var(--text-dim); font-size: .82rem; min-width: 48px; text-align: right; }
.pitchers { font-size: .82rem; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 8px; }
.fav { color: var(--accent2); }
.score { font-size: 1.25rem; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 30px; text-align: right; display: inline-block; }
.tname.winner { color: var(--accent); }
.score.winner { color: var(--accent); }
.badge.live { background: rgba(207,34,46,.10); color: var(--danger); }
.gcard.is-live { border-color: rgba(207,34,46,.45); }
.probbar { height: 6px; border-radius: 3px; background: var(--bg-elev); overflow: hidden; display: flex; }
.probbar .away-seg { background: var(--accent2); }
.probbar .home-seg { background: #f2a7cd; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1>Games Dashboard</h1>
  <p class="subtitle">Upcoming MLB games with probable pitchers, records, and market win probabilities.</p>

  <div class="controls">
    <div class="field">
      <label for="date-pick">Date</label>
      <input type="date" id="date-pick">
    </div>
    <button onclick="shiftDay(0)">Today</button>
    <button class="secondary" onclick="shiftDay(1)">Tomorrow</button>
    <button class="secondary" onclick="load()">Refresh</button>
  </div>

  <div id="odds-note"></div>
  <div class="kpis" id="kpis"></div>
  <div id="status" class="loading">Loading schedule…</div>
  <div class="games-grid" id="games"></div>
</main>
<footer id="footer"></footer>
<script src="js/app.js"></script>
<script>
renderNav("dashboard.html"); renderFooter();

const datePick = document.getElementById("date-pick");
datePick.value = localISODate(new Date());
datePick.addEventListener("change", load);
load();

function localISODate(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function shiftDay(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  datePick.value = localISODate(d);
  load();
}

async function load() {
  const statusEl = document.getElementById("status");
  const gamesEl = document.getElementById("games");
  const kpisEl = document.getElementById("kpis");
  const noteEl = document.getElementById("odds-note");
  statusEl.innerHTML = `<div class="loading">Loading schedule…</div>`;
  gamesEl.innerHTML = ""; kpisEl.innerHTML = ""; noteEl.innerHTML = "";

  const date = datePick.value;
  const schedUrl = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}&hydrate=probablePitcher,linescore`;

  // Fetch schedule and (optionally) odds in parallel
  const oddsUrl = ApiKey.get()
    ? `https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${encodeURIComponent(ApiKey.get())}&regions=us&markets=h2h&oddsFormat=american`
    : null;

  let sched, oddsMap = null;
  try {
    const [sRes, oRes] = await Promise.all([
      fetch(schedUrl),
      oddsUrl ? fetch(oddsUrl).catch(() => null) : Promise.resolve(null)
    ]);
    if (!sRes.ok) throw new Error("Schedule HTTP " + sRes.status);
    sched = await sRes.json();
    if (oRes && oRes.ok) oddsMap = buildOddsMap(await oRes.json());
    else if (oddsUrl) noteEl.innerHTML = `<div class="notice warn">Couldn't load odds (check your API key on the Live Odds page) — showing schedule only.</div>`;
    else noteEl.innerHTML = `<div class="notice">No Odds API key saved — showing schedule only. Add your key on the <a href="odds.html">Live Odds</a> page to see market win probabilities here.</div>`;
  } catch (e) {
    statusEl.innerHTML = `<div class="notice warn">Failed to load schedule (${escapeHtml(e.message)}).</div>`;
    return;
  }

  const games = ((sched.dates && sched.dates[0]) || {}).games || [];
  if (!games.length) {
    statusEl.innerHTML = `<div class="notice">No MLB games scheduled for ${date}.</div>`;
    return;
  }
  statusEl.innerHTML = "";
  games.sort((a, b) => new Date(a.gameDate) - new Date(b.gameDate));

  // Attach market data
  const enriched = games.map(g => {
    const away = g.teams.away.team.name, home = g.teams.home.team.name;
    const mkt = oddsMap ? oddsMap[away + "@" + home] : null;
    return { g, mkt };
  });

  renderKPIs(kpisEl, enriched);
  document.getElementById("games").innerHTML = enriched.map(renderGameCard).join("");
}

// Consensus no-vig probabilities per matchup from The Odds API payload
function buildOddsMap(events) {
  const map = {};
  for (const ev of events) {
    const rows = [];
    for (const bk of ev.bookmakers || []) {
      const m = (bk.markets || []).find(m => m.key === "h2h");
      if (!m) continue;
      const oA = m.outcomes.find(o => o.name === ev.away_team);
      const oH = m.outcomes.find(o => o.name === ev.home_team);
      if (oA && oH) rows.push([oA.price, oH.price]);
    }
    if (!rows.length) continue;
    const avgA = rows.reduce((s, r) => s + Odds.amToProb(r[0]), 0) / rows.length;
    const avgH = rows.reduce((s, r) => s + Odds.amToProb(r[1]), 0) / rows.length;
    const tot = avgA + avgH;
    const bestA = Math.max(...rows.map(r => Odds.amToDec(r[0])));
    const bestH = Math.max(...rows.map(r => Odds.amToDec(r[1])));
    map[ev.away_team + "@" + ev.home_team] = {
      pAway: avgA / tot, pHome: avgH / tot,
      mlAway: Odds.decToAm(bestA), mlHome: Odds.decToAm(bestH),
      books: rows.length
    };
  }
  return map;
}

function renderKPIs(el, enriched) {
  const n = enriched.length;
  const live = enriched.filter(x => x.g.status.abstractGameState === "Live").length;
  const final = enriched.filter(x => x.g.status.abstractGameState === "Final").length;
  const withOdds = enriched.filter(x => x.mkt && x.g.status.abstractGameState === "Preview");
  let favHtml = `<div class="kpi"><div class="label">Biggest favorite</div><div class="value dim">—</div><div class="sub">needs odds key</div></div>`;
  let dogHtml = `<div class="kpi"><div class="label">Closest game</div><div class="value dim">—</div><div class="sub">needs odds key</div></div>`;
  if (withOdds.length) {
    const byFav = [...withOdds].sort((a, b) =>
      Math.max(b.mkt.pAway, b.mkt.pHome) - Math.max(a.mkt.pAway, a.mkt.pHome));
    const top = byFav[0], close = byFav[byFav.length - 1];
    const topTeam = top.mkt.pHome >= top.mkt.pAway ? top.g.teams.home.team.name : top.g.teams.away.team.name;
    favHtml = `<div class="kpi"><div class="label">Biggest favorite</div>
      <div class="value">${Odds.fmtPct(Math.max(top.mkt.pAway, top.mkt.pHome))}</div>
      <div class="sub">${escapeHtml(topTeam)}</div></div>`;
    dogHtml = `<div class="kpi"><div class="label">Closest game</div>
      <div class="value">${Odds.fmtPct(Math.max(close.mkt.pAway, close.mkt.pHome))}</div>
      <div class="sub">${escapeHtml(close.g.teams.away.team.name)} @ ${escapeHtml(close.g.teams.home.team.name)}</div></div>`;
  }
  const first = enriched[0], last = enriched[n - 1];
  const t = d => new Date(d).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  el.innerHTML = `
    <div class="kpi"><div class="label">Games</div><div class="value">${n}</div>
      <div class="sub">${live ? `<span class="neg-text">${live} live</span> · ` : ""}${final} final · ${n - live - final} upcoming</div></div>
    <div class="kpi"><div class="label">First pitch</div><div class="value">${t(first.g.gameDate)}</div>
      <div class="sub">last: ${t(last.g.gameDate)}</div></div>
    ${favHtml}${dogHtml}
    <div class="kpi"><div class="label">Odds coverage</div>
      <div class="value">${withOdds.length}/${n - live - final}</div><div class="sub">upcoming games priced</div></div>`;
}

function renderGameCard({ g, mkt }) {
  const away = g.teams.away, home = g.teams.home;
  const time = new Date(g.gameDate).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  const abstract = g.status.abstractGameState; // Preview | Live | Final
  const isLive = abstract === "Live";
  const isFinal = abstract === "Final";
  const hasScore = (isLive || isFinal) && away.score !== undefined && home.score !== undefined;
  const rec = t => t.leagueRecord ? `${t.leagueRecord.wins}-${t.leagueRecord.losses}` : "";
  const pitcher = t => t.probablePitcher ? escapeHtml(t.probablePitcher.fullName) : "TBD";
  const series = g.seriesGameNumber && g.gamesInSeries ? `Game ${g.seriesGameNumber} of ${g.gamesInSeries}` : "";

  // Status badge: inning for live, Final (+extras) for finished, series info otherwise
  let statusHtml = escapeHtml(series);
  if (isLive) {
    const ls = g.linescore || {};
    const inning = ls.currentInningOrdinal ? `${ls.inningState || ""} ${ls.currentInningOrdinal}`.trim() : "Live";
    statusHtml = `<span class="badge live">● ${escapeHtml(inning)}</span>`;
  } else if (isFinal) {
    const ls = g.linescore || {};
    const extras = ls.currentInning && ls.currentInning > 9 ? `/${ls.currentInning}` : "";
    statusHtml = `<span class="badge neutral">Final${extras}</span>`;
  } else if (g.status.detailedState !== "Scheduled") {
    statusHtml = `<span class="badge neutral">${escapeHtml(g.status.detailedState)}</span>`;
  }

  // Show market data whenever we have it (pre-game consensus stays visible during/after the game)
  const showMkt = !!mkt;
  const favA = showMkt && !isFinal && mkt.pAway > mkt.pHome;
  const favH = showMkt && !isFinal && mkt.pHome >= mkt.pAway;
  const mktHtml = showMkt ? `<div class="probbar" title="Market win probability">
      <div class="away-seg" style="width:${(mkt.pAway * 100).toFixed(1)}%"></div>
      <div class="home-seg" style="width:${(mkt.pHome * 100).toFixed(1)}%"></div>
    </div>` : "";

  const winA = isFinal && hasScore && away.score > home.score;
  const winH = isFinal && hasScore && home.score > away.score;

  const line = (t, p, ml, isFav, isWinner) => `<div class="teamline">
    <span>
      <span class="tname ${isFav ? "fav" : ""} ${isWinner ? "winner" : ""}">${escapeHtml(t.team.name)}</span>
      <span class="rec">${rec(t)}</span>
    </span>
    <span>
      ${showMkt ? `<span class="prob">${Odds.fmtPct(p)}</span> <span class="ml">${Odds.fmtAm(ml)}</span>` : ""}
      ${hasScore ? `<span class="score ${isWinner ? "winner" : isFinal ? "dim" : ""}">${t.score}</span>` : ""}
    </span>
  </div>`;

  const footHtml = isFinal
    ? `<div class="pitchers">Final score${showMkt ? `<span class="dim"> &middot; odds shown were pre-game market consensus</span>` : ""}</div>`
    : `<div class="pitchers">⚾ ${pitcher(away)} vs ${pitcher(home)}
        ${showMkt ? `<span class="dim"> · best price across ${mkt.books} books</span>` : ""}</div>`;

  return `<div class="gcard ${isLive ? "is-live" : ""}">
    <div class="time">
      <span>${time} · ${escapeHtml(g.venue.name)}</span>
      <span>${statusHtml}</span>
    </div>
    ${line(away, showMkt && mkt.pAway, showMkt && mkt.mlAway, favA, winA)}
    ${line(home, showMkt && mkt.pHome, showMkt && mkt.mlHome, favH, winH)}
    ${mktHtml}
    ${footHtml}
  </div>`;
}
</script>
</body>
</html>
