<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results | LyDia Public Pick Record</title>
<meta name="description" content="LyDia public pick record. Every published MLB pick should be graded transparently, with wins and losses kept visible.">
<link rel="canonical" href="https://mlbedges.com/results.html">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <p class="eyebrow">Public record</p>
  <h1>Results</h1>
  <p class="subtitle">Every published pick is graded against final scores. Wins and losses stay visible.</p>
  <div class="notice pink"><strong>Founding stage:</strong> LyDia has no graded public pick history yet. The record starts at 0-0.</div>
  <div class="grid grid-4" style="margin-bottom:24px">
    <div class="card"><div class="dim small">RECORD</div><div class="big-num">0-0</div></div>
    <div class="card"><div class="dim small">WIN RATE</div><div class="big-num">—%</div></div>
    <div class="card"><div class="dim small">UNITS, FLAT 1U</div><div class="big-num">0.00</div></div>
    <div class="card"><div class="dim small">DAYS TRACKED</div><div class="big-num">0</div></div>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>Date</th><th class="num">Record</th><th class="num">Units</th><th>Picks</th></tr></thead>
      <tbody><tr><td colspan="4" class="dim">No graded slates yet.</td></tr></tbody>
    </table>
  </div>
</main>
<footer id="footer"></footer>
<script src="js/app.js"></script>
<script>renderNav("results.html"); renderFooter();</script>
</body>
</html>
