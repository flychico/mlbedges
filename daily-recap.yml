name: Daily content

on:
  schedule:
    # 11:00 UTC = 6/7am US Eastern — grade yesterday, recap yesterday, preview today
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Grade yesterday's picks
        run: node scripts/grade-results.js

      - name: Generate yesterday's recap
        run: node scripts/generate-recap.js

      - name: Generate today's previews and picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/generate-previews.js

      - name: Commit and push if changed
        run: |
          git config user.name "lydia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add recaps/ previews/ data/ results.html sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily content $(date -u +%F)"
            git push
          fi
