<meta charset="UTF-8">

<meta name="description" content="Review MLB bullpen workload by team using LyDia's generated bullpen fatigue source of truth.">
<link rel="canonical" href="https://mlbedges.com/tools/bullpen-fatigue/">

<link rel="stylesheet" href="/css/style.css">
<style>
.controls { display:flex; gap:10px; align-items:end; flex-wrap:wrap; margin-bottom:16px; }
.controls .field { margin-bottom:0; }
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin:16px 0 22px; }
.kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.kpi .label { font-size:.76rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; }
.kpi .value { font-size:1.35rem; font-weight:800; }
.team-card { margin-bottom:14px; }
.team-head { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; align-items:baseline; margin-bottom:8px; }
.team-head .matchup { font-weight:800; font-size:1.05rem; }
.metric-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr)); gap:10px; margin-top:10px; }
.metric-box { background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius); padding:12px; }
.metric-box .label { color:var(--text-dim); font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
.metric-box .value { font-size:1.25rem; font-weight:800; font-variant-numeric:tabular-nums; }
.read { margin-top:10px; font-size:.88rem; color:var(--text-dim); }
.grade-line { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.fpill{border:1px solid var(--border);background:var(--bg-card);border-radius:16px;padding:3px 10px;font-size:.76rem;font-weight:700;cursor:pointer;color:var(--text-dim);white-space:nowrap}
.fpill.on{background:var(--accent2);border-color:var(--accent2);color:#fff}
.hidden{display:none}
.gauge { height:10px; background:var(--bg-elev); border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-top:6px; }
.gauge i { display:block; height:100%; border-radius:6px; }
.pen-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px; }
.pen-box { background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius); padding:12px; }
@media (max-width:720px){ .pen-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <p class="eyebrow">LyDia's Lab</p>
  <h1>Bullpen Fatigue Index</h1>
  <p class="subtitle">Which bullpens come in fresh tonight and which are running on fumes — recent innings, back-to-back arms, and how hard the pen has been hit. Always cross-check injuries and roster moves before leaning on it.</p>

  <div class="controls">
    <div class="field">
      <label for="date-pick">Date</label>
      <input type="date" id="date-pick">
    </div>
    <button onclick="shiftDay(0)">Today</button>
    <button class="secondary" onclick="shiftDay(1)">Tomorrow</button>
    <button class="secondary" onclick="load()">Refresh</button>
  </div>

  <div id="source" class="notice">Loading bullpen source…</div>
  <div id="bp-filter" style="margin-bottom:10px"></div>
  <div id="kpis" class="kpis"></div>
  <div id="status" class="loading">Loading bullpen workload…</div>
  <div id="teams"></div>
</main>
<footer id="footer"></footer><script src="/js/app.js"></script>
<script>
renderNav("/tools/"); renderFooter();

const datePick = document.getElementById("date-pick");
datePick.value = localISODate(new Date());
datePick.addEventListener("change", load);
load();

function localISODate(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function shiftDay(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  datePick.value = localISODate(d);
  load();
}
function fmt(v, dp=1) { return typeof v === "number" && Number.isFinite(v) ? Number(v).toFixed(dp) : "—"; }
function esc(s) { return escapeHtml(String(s ?? "")); }

async function load() {
  const date = datePick.value;
  const statusEl = document.getElementById("status");
  const teamsEl = document.getElementById("teams");
  const kpisEl = document.getElementById("kpis");
  const sourceEl = document.getElementById("source");

  statusEl.innerHTML = `<div class="loading">Loading bullpen workload…</div>`;
  teamsEl.innerHTML = "";
  kpisEl.innerHTML = "";
  sourceEl.className = "notice";
  sourceEl.innerHTML = "Loading bullpen source…";

const today = localISODate(new Date());

// Prefer the date-specific file first.
// today.json is only a fallback.
const urls = date === today
  ? [`/data/bullpen/${date}.json`, `/data/bullpen/today.json`]
  : [`/data/bullpen/${date}.json`];

let data = null;
let loadedUrl = null;

for (const url of urls) {
  try {
    const cacheBust = `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;
    const res = await fetch(cacheBust, { cache: "no-store" });
    if (!res.ok) continue;

    const candidate = await res.json();

    // Hard stop: do not use a file for the wrong date.
    if (!candidate || candidate.date !== date || !Array.isArray(candidate.teams)) {
      console.warn(`Skipped bullpen file ${url}: date mismatch or invalid teams array`, candidate);
      continue;
    }

    data = candidate;
    loadedUrl = url;
    break;
  } catch(e) {
    console.warn(`Could not load bullpen file ${url}`, e);
  }
}

  if (!data || !Array.isArray(data.teams)) {
    sourceEl.className = "notice warn";
    sourceEl.innerHTML = `<strong>No generated bullpen file found for ${esc(date)}.</strong><br><span class="small dim">Run the daily publish workflow before opening this date.</span>`;
    statusEl.innerHTML = "";
    kpisEl.innerHTML = "";
    teamsEl.innerHTML = "";
    return;
  }

  allRows = [...data.teams].sort((a,b) => (b.score ?? -1) - (a.score ?? -1) || String(a.team).localeCompare(String(b.team)));
  const rows = allRows;
  statusEl.innerHTML = "";
  sourceEl.className = "hidden";
  sourceEl.innerHTML = "";
  renderFilter();

  const high = rows.filter(r => r.label === "High risk").length;
  const tired = rows.filter(r => r.label === "Tired").length;
  const fresh = rows.filter(r => r.label === "Fresh").length;
  kpisEl.innerHTML = `
    <div class="kpi"><div class="label">Teams tracked</div><div class="value">${rows.length}</div><div class="small dim">playing selected date</div></div>
    <div class="kpi"><div class="label">High risk</div><div class="value">${high}</div><div class="small dim">heavy recent workload</div></div>
    <div class="kpi"><div class="label">Tired</div><div class="value">${tired}</div><div class="small dim">elevated usage</div></div>
    <div class="kpi"><div class="label">Fresh</div><div class="value">${fresh}</div><div class="small dim">low recent workload</div></div>`;

  renderTeams();
}

let allRows = [];
let bpFilter = new Set();
function shortTeam(name) {
  const two = ["Red Sox", "White Sox", "Blue Jays"];
  for (const t of two) if (name.endsWith(t)) return t;
  return name.split(" ").pop();
}
function renderFilter() {
  const el = document.getElementById("bp-filter");
  if (!el || !allRows.length) return;
  const teams = [...allRows].sort((a, b) => shortTeam(a.team).localeCompare(shortTeam(b.team)));
  el.innerHTML = `<div class="small dim" style="margin-bottom:4px">Compare bullpens — tap as many as you want${bpFilter.size ? ` · showing ${bpFilter.size} · <a style="cursor:pointer;color:var(--accent2);font-weight:700" onclick="bpFilter.clear();renderFilter();renderTeams()">clear</a>` : ""}</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      <span class="fpill ${bpFilter.size ? "" : "on"}" onclick="bpFilter.clear();renderFilter();renderTeams()">All</span>
      ${teams.map((t, i) => `<span class="fpill ${bpFilter.has(t.team) ? "on" : ""}" onclick="toggleBpTeam(${i})" data-team="${esc(t.team)}">${esc(shortTeam(t.team))}</span>`).join("")}
    </div>`;
}
function toggleBpTeam(i) {
  const pills = document.querySelectorAll("#bp-filter .fpill[data-team]");
  const name = pills[i] && pills[i].dataset.team;
  if (!name) return;
  if (bpFilter.has(name)) bpFilter.delete(name); else bpFilter.add(name);
  renderFilter(); renderTeams();
}
function gaugeColor(score) {
  if (score >= 82) return "#cf222e";
  if (score >= 62) return "#e08726";
  if (score < 35) return "#1e8e3e";
  return "#4d9fdc";
}
function penBox(t) {
  const runs = Number.isFinite(t.last3_bp_runs) ? t.last3_bp_runs : null;
  return `<div class="pen-box">
    <div style="display:flex;justify-content:space-between;align-items:baseline"><b>${esc(t.team)}</b>
      <span><b style="font-size:1.2rem">${Number.isFinite(t.score) ? (t.score/10).toFixed(1) : "—"}</b><span class="dim small">/10</span> <span class="badge ${t.label === "High risk" || t.label === "Tired" ? "neg" : t.label === "Fresh" ? "pos" : "neutral"}">${esc(t.label || "?")}</span></span></div>
    <div class="gauge"><i style="width:${Math.min(100, t.score ?? 0)}%;background:${gaugeColor(t.score ?? 0)}"></i></div>
    <div class="small dim" style="margin-top:6px">${fmt(t.last3_bp_ip)} IP · ${t.last3_relievers ?? "—"} appearances · ${t.back_to_back_arms ?? 0} b2b arm${t.back_to_back_arms === 1 ? "" : "s"}${runs !== null ? ` · <b class="${runs >= 6 ? "neg-text" : ""}">${runs} runs allowed</b>` : ""}</div>
    <div class="small dim" style="margin-top:4px">${esc(teamRead(t))}</div>
  </div>`;
}
function renderTeams() {
  const rows = bpFilter.size ? allRows.filter(r => bpFilter.has(r.team)) : allRows;
  // group by game so both pens face each other, like the other matchup tools
  const byGame = {};
  const solo = [];
  for (const t of rows) { if (t.game_pk) (byGame[t.game_pk] = byGame[t.game_pk] || []).push(t); else solo.push(t); }
  const cards = [];
  for (const pk of Object.keys(byGame)) {
    const pair = byGame[pk];
    if (pair.length === 2) {
      const [x, y] = pair[0].side === "away" ? pair : [pair[1], pair[0]];
      const gap = Math.abs(x.score - y.score);
      const fresher = x.score < y.score ? x.team : y.team;
      const verdict = gap >= 20 ? `<b>${esc(fresher)}</b> has the meaningfully fresher pen — a real late-inning lean (gap ${(gap/10).toFixed(1)}).`
        : gap >= 10 ? `${esc(fresher)}'s pen is somewhat fresher (gap ${(gap/10).toFixed(1)}).`
        : `No meaningful bullpen edge either way (gap ${(gap/10).toFixed(1)}).`;
      cards.push(`<div class="card team-card">
        <div class="team-head"><span class="matchup">${esc(x.game || x.team + " vs " + y.team)}</span></div>
        <div class="pen-grid">${penBox(x)}${penBox(y)}</div>
        <div class="read">${verdict}</div>
      </div>`);
    } else {
      pair.forEach(t => cards.push(`<div class="card team-card"><div class="pen-grid" style="grid-template-columns:1fr">${penBox(t)}</div></div>`));
    }
  }
  solo.forEach(t => cards.push(`<div class="card team-card"><div class="pen-grid" style="grid-template-columns:1fr">${penBox(t)}</div></div>`));
  document.getElementById("teams").innerHTML = cards.join("");
}
/* Plain-English read composed from fields — never shows internal formula text,
   works with both old and new generated files. */
function teamRead(t) {
  if (!t.recent_games_tracked) return `${t.label} (${(t.score/10).toFixed(1)}/10). No completed games in the last three days — the pen comes in rested.`;
  const bits = [];
  bits.push(`${fmt(t.last3_bp_ip)} relief innings over the last three days` + (t.last_game_bp_ip >= 4 ? ` — ${fmt(t.last_game_bp_ip)} in the last game` : ""));
  if (t.back_to_back_arms > 0) bits.push(`${t.back_to_back_arms} arm${t.back_to_back_arms === 1 ? "" : "s"} worked back-to-back days`);
  if (Number.isFinite(t.last3_bp_runs)) {
    if (t.last3_bp_runs >= 6) bits.push(`and the pen was hit hard for ${t.last3_bp_runs} runs in that stretch`);
    else if (t.last3_bp_runs >= 1) bits.push(`allowing ${t.last3_bp_runs} run${t.last3_bp_runs === 1 ? "" : "s"}`);
    else bits.push(`without allowing a run`);
  }
  return `${t.label} (${(t.score/10).toFixed(1)}/10): ` + bits.join(", ") + ".";
}

function renderTeam(t) {
  const cls = t.label === "High risk" || t.label === "Tired" ? "neg" : t.label === "Fresh" ? "pos" : "neutral";
  return `<div class="card team-card">
    <div class="team-head">
      <span class="matchup">${esc(t.team)}</span>
      <span class="dim small">${esc(t.game || "")}</span>
    </div>
    <div class="grade-line">
      <span class="badge ${cls}">${esc(t.label || "Unknown")}</span>
      <span><b>Fatigue score:</b> ${Number.isFinite(t.score) ? (t.score/10).toFixed(1) : "—"}/10</span>
      <span class="dim small">${t.recent_games_tracked ?? 0} recent game${t.recent_games_tracked === 1 ? "" : "s"} tracked</span>
    </div>
    <div class="metric-grid">
      <div class="metric-box"><div class="label">Last game BP IP</div><div class="value">${fmt(t.last_game_bp_ip)}</div></div>
      <div class="metric-box"><div class="label">Last 3 days BP IP</div><div class="value">${fmt(t.last3_bp_ip)}</div></div>
      <div class="metric-box"><div class="label">Last game relievers</div><div class="value">${t.last_game_relievers ?? "—"}</div></div>
      <div class="metric-box"><div class="label">Last 3 relievers</div><div class="value">${t.last3_relievers ?? "—"}</div></div>
      <div class="metric-box"><div class="label">B2B arms</div><div class="value">${t.back_to_back_arms ?? "—"}</div></div>
      <div class="metric-box"><div class="label">Runs allowed (3d)</div><div class="value">${Number.isFinite(t.last3_bp_runs) ? t.last3_bp_runs : "—"}</div></div>
    </div>
    <div class="read">${esc(teamRead(t))}</div>
  </div>`;
}
</script>
</body>
</html>
