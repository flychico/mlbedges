<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XVWTMDNBJK"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XVWTMDNBJK');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LyDia vs Market | LyDia's Lab</title>
<meta name="description" content="Track LyDia's posted prices against current and closing market prices.">
<link rel="canonical" href="https://mlbedges.com/tools/market/">
<link rel="stylesheet" href="/css/style.css">
<style>
.controls { display:flex; gap:10px; align-items:end; flex-wrap:wrap; margin-bottom:16px; }
.controls .field { margin-bottom:0; }
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin:16px 0 22px; }
.kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.kpi .label { font-size:.76rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; }
.kpi .value { font-size:1.35rem; font-weight:800; }
.market-card { margin-bottom:14px; }
.market-head { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; align-items:baseline; margin-bottom:8px; }
.market-head .matchup { font-weight:800; font-size:1.05rem; }
.market-line { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:8px 0 10px; }
.metric-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:10px; }
.metric-box { background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius); padding:12px; }
.metric-box .label { color:var(--text-dim); font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
.metric-box .value { font-size:1.18rem; font-weight:800; font-variant-numeric:tabular-nums; }
.read { margin-top:10px; font-size:.88rem; color:var(--text-dim); }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <p class="eyebrow">LyDia's Lab</p>
  <h1>LyDia vs Market</h1>
  <p class="subtitle">Track how LyDia's posted numbers age against current and closing market prices.</p>

  <div class="controls">
    <div class="field">
      <label for="date-pick">Date</label>
      <input type="date" id="date-pick">
    </div>
    <button onclick="shiftDay(0)">Today</button>
    <button class="secondary" onclick="shiftDay(-1)">Yesterday</button>
    <button class="secondary" onclick="loadMarket()">Refresh</button>
  </div>

  <div id="status" class="loading">Loading market tracker...</div>
  <div id="kpis" class="kpis"></div>
  <div id="items"></div>
</main>
<footer id="footer"></footer><script src="/js/app.js"></script>
<script>
renderNav("/tools/"); renderFooter();

const datePick = document.getElementById("date-pick");
datePick.value = localISODate(new Date());
datePick.addEventListener("change", loadMarket);
loadMarket();

function localISODate(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function shiftDay(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  datePick.value = localISODate(d);
  loadMarket();
}
function fmtOdds(v) { return typeof v === "number" ? Odds.fmtAm(v) : "-"; }
function friendlyTime(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return "-";
  return d.toLocaleString("en-US", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit", timeZone:"America/New_York", timeZoneName:"short" });
}

async function loadMarket() {
  const date = datePick.value;
  const statusEl = document.getElementById("status");
  const kpisEl = document.getElementById("kpis");
  const itemsEl = document.getElementById("items");
  statusEl.innerHTML = `<div class="loading">Loading market tracker...</div>`;
  kpisEl.innerHTML = ""; itemsEl.innerHTML = "";

  let data = null;
  const urls = date === localISODate(new Date())
    ? [`/data/market/today.json`, `/data/market/${date}.json`]
    : [`/data/market/${date}.json`];

  for (const url of urls) {
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (res.ok) { data = await res.json(); break; }
    } catch(e) {}
  }

  if (!data || !Array.isArray(data.items)) {
    statusEl.innerHTML = `<div class="notice warn">
      <strong>No market tracker data found for ${escapeHtml(date)}.</strong><br>
      Market tracking appears after an official card has been published and a market snapshot exists.
    </div>`;
    return;
  }

  statusEl.innerHTML = "";
  const items = data.items || [];
  const toward = items.filter(x => x.movement === "toward_lydia").length;
  const away = items.filter(x => x.movement === "away_from_lydia").length;
  const stable = items.filter(x => x.movement === "stable").length;
  const closeTracked = items.filter(x => typeof x.closing_price === "number").length;

  kpisEl.innerHTML = `
    <div class="kpi"><div class="label">Tracked picks</div><div class="value">${items.length}</div><div class="small dim">${escapeHtml(data.date || date)}</div></div>
    <div class="kpi"><div class="label">Toward LyDia</div><div class="value">${toward}</div><div class="small dim">price moved against late buyers</div></div>
    <div class="kpi"><div class="label">Away from LyDia</div><div class="value">${away}</div><div class="small dim">price became more favorable</div></div>
    <div class="kpi"><div class="label">Closing tracked</div><div class="value">${closeTracked}</div><div class="small dim">closing value present</div></div>`;

  itemsEl.innerHTML = items.length
    ? items.map(renderItem).join("")
    : `<div class="notice">No official picks were tracked for this date.</div>`;
}

function renderItem(x) {
  const cls = x.movement === "toward_lydia" ? "pos" : x.movement === "away_from_lydia" ? "neg" : "neutral";
  const label = x.movement === "toward_lydia" ? "Toward LyDia"
    : x.movement === "away_from_lydia" ? "Away from LyDia"
    : x.movement === "stable" ? "Stable" : "Pending";
  return `<div class="card market-card">
    <div class="market-head">
      <span class="matchup">${escapeHtml(x.game || "")}</span>
      <span class="dim small">${escapeHtml(x.market || "Moneyline")}</span>
    </div>
    <div class="market-line">
      <span class="badge ${cls}">${label}</span>
      <span><b>Pick:</b> ${escapeHtml(x.pick || x.pick_team || "-")}</span>
      ${x.result ? `<span class="dim small">Result: ${escapeHtml(x.result)}</span>` : ""}
    </div>
    <div class="metric-grid">
      <div class="metric-box"><div class="label">Posted price</div><div class="value">${fmtOdds(x.posted_price)}</div></div>
      <div class="metric-box"><div class="label">Current price</div><div class="value">${fmtOdds(x.current_price)}</div></div>
      <div class="metric-box"><div class="label">Closing price</div><div class="value">${fmtOdds(x.closing_price)}</div></div>
      <div class="metric-box"><div class="label">Posted at</div><div class="value small">${escapeHtml(friendlyTime(x.posted_at))}</div></div>
      <div class="metric-box"><div class="label">Last checked</div><div class="value small">${escapeHtml(friendlyTime(x.last_checked_at))}</div></div>
      <div class="metric-box"><div class="label">Lab Score</div><div class="value">${x.lab_score ?? "-"}</div></div>
    </div>
    <div class="read">${escapeHtml(x.read || "Market tracking compares LyDia's posted number against later snapshots. Closing values require a late snapshot near first pitch.")}</div>
  </div>`;
}
</script>
</body>
</html>
