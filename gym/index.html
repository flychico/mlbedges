<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MichelAngelo — Workout Planner & Log</title>
<meta name="description" content="Personal strength training planner and workout log. Every block of stone has a statue inside it.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#f6f8fa">
<link rel="manifest" href="/gym/manifest.json">
<link rel="apple-touch-icon" href="/gym/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128511;</text></svg>">
<style>
/* LyDia palette — light (default) */
:root{
  --bg:#f6f8fa;--bg2:#eef1f4;--card:#ffffff;--border:#d0d7de;
  --text:#1f2328;--dim:#57606a;
  --pink:#d6508e;--blue:#4d9fdc;
  --green:#1e8e3e;--red:#cf222e;--gold:#9a6700;--radius:12px;
  --shadow:0 1px 3px rgba(31,35,40,.08);
}
[data-theme=dark]{
  --bg:#0d1220;--bg2:#121a2e;--card:#171f36;--border:#26314f;
  --text:#e8edf6;--dim:#8b9ab5;
  --pink:#e56ba3;--blue:#5daae6;
  --green:#3ddc84;--red:#ff5d5d;--gold:#ffce4d;
  --shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px;line-height:1.45;padding-bottom:84px;min-height:100vh;transition:background .2s}
.wrap{max-width:560px;margin:0 auto;padding:16px 14px}
h1{font-size:1.5rem;margin-bottom:2px}
h1 .mich{color:var(--blue)}h1 .angelo{color:var(--pink)}
h2{font-size:1.15rem;margin:18px 0 10px}
h3{font-size:1rem}
.dim{color:var(--dim)}.small{font-size:.83rem}.green{color:var(--green)}.red{color:var(--red)}.gold{color:var(--gold)}.blue{color:var(--blue)}.pink{color:var(--pink)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.btn{display:inline-block;background:var(--pink);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:1rem;font-weight:700;cursor:pointer;text-align:center}
.btn:active{filter:brightness(.92)}
.btn.full{width:100%}
.btn.blue-btn{background:var(--blue)}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text);font-weight:600}
.btn.small-btn{padding:7px 12px;font-size:.85rem;border-radius:8px}
.btn.danger{background:transparent;border:1px solid var(--red);color:var(--red)}
input,select{background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:1rem;padding:10px 12px;width:100%}
input:focus{outline:none;border-color:var(--blue)}
input[type=number]{text-align:center;font-weight:700;font-size:1.05rem}
label{display:block;font-size:.85rem;color:var(--dim);margin:12px 0 5px;font-weight:600}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.tabbar div{flex:1;text-align:center;padding:11px 0 9px;font-size:.72rem;color:var(--dim);cursor:pointer;font-weight:600}
.tabbar div.on{color:var(--pink)}
.tabbar .ico{font-size:1.25rem;display:block;margin-bottom:1px}
.pill{display:inline-block;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:.8rem;font-weight:700;margin:0 6px 6px 0;color:var(--dim);cursor:pointer}
.pill.on{background:var(--pink);border-color:var(--pink);color:#fff}
.setrow{display:grid;grid-template-columns:34px 1fr 16px 1fr 44px;gap:8px;align-items:center;margin-bottom:8px}
.setrow .setnum{color:var(--dim);font-weight:700;font-size:.9rem;text-align:center}
.setrow .x{color:var(--dim);text-align:center}
.chk{width:44px;height:44px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);color:transparent;font-size:1.15rem;font-weight:900;cursor:pointer}
.chk.done{background:var(--green);border-color:var(--green);color:#fff}
.exhead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:8px}
.lastinfo{font-size:.8rem;color:var(--dim);margin-bottom:8px}
.suggest{font-size:.83rem;color:var(--gold);font-weight:600;margin-bottom:8px}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.statgrid .card{margin:0;text-align:center;padding:12px 8px}
.statgrid .big{font-size:1.45rem;font-weight:800}
table{width:100%;border-collapse:collapse;font-size:.86rem}
th{color:var(--dim);text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;padding:6px 6px}
td{padding:7px 6px;border-top:1px solid var(--border)}
.num{text-align:right}
.hidden{display:none!important}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-weight:700;padding:10px 20px;border-radius:24px;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.timer{position:fixed;bottom:64px;left:0;right:0;background:var(--blue);color:#fff;font-weight:800;text-align:center;padding:9px;z-index:49;font-size:1rem;cursor:pointer;padding-bottom:calc(9px + env(safe-area-inset-bottom))}
.swaplist{max-height:340px;overflow-y:auto}
.swaplist .card{padding:10px 12px;cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(10,14,25,.6);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.modal>.inner{background:var(--bg);border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:82vh;overflow-y:auto}
canvas{width:100%;height:150px}
.daycard{cursor:pointer}
.exline{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border);font-size:.9rem}
.exline:first-of-type{border-top:none}
.qopt{margin-bottom:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.quote{font-style:italic;color:var(--dim);font-size:.86rem;border-left:3px solid var(--pink);padding-left:10px;margin:10px 0}
</style>
</head>
<body>
<div class="wrap">
  <div id="view"></div>
</div>
<div class="tabbar" id="tabbar">
  <div data-tab="today" class="on"><span class="ico">🏋️</span>Today</div>
  <div data-tab="plan"><span class="ico">📋</span>Plan</div>
  <div data-tab="progress"><span class="ico">📈</span>Progress</div>
  <div data-tab="settings"><span class="ico">⚙️</span>Settings</div>
</div>
<div id="timer" class="timer hidden"></div>
<script>
"use strict";
/* ============ Exercise database ============
   pattern: squat hinge glute lunge pushH pushV pullH pullV core arms shoulders calves
   equip: gym | db | bw   ·   inc: progression increment (lb) */
const EX = [
  {id:"bb-squat",n:"Barbell Back Squat",p:"squat",e:"gym",m:"Quads/Glutes",inc:10},
  {id:"goblet-squat",n:"Goblet Squat",p:"squat",e:"db",m:"Quads/Glutes",inc:5},
  {id:"leg-press",n:"Leg Press",p:"squat",e:"gym",m:"Quads/Glutes",inc:20},
  {id:"hack-squat",n:"Hack Squat",p:"squat",e:"gym",m:"Quads",inc:10},
  {id:"bw-squat",n:"Bodyweight Squat",p:"squat",e:"bw",m:"Quads/Glutes",inc:0},
  {id:"bb-deadlift",n:"Barbell Deadlift",p:"hinge",e:"gym",m:"Posterior chain",inc:10},
  {id:"rdl",n:"Romanian Deadlift",p:"hinge",e:"gym",m:"Hamstrings/Glutes",inc:10},
  {id:"db-rdl",n:"Dumbbell RDL",p:"hinge",e:"db",m:"Hamstrings/Glutes",inc:5},
  {id:"sumo-dl",n:"Sumo Deadlift",p:"hinge",e:"gym",m:"Glutes/Adductors",inc:10},
  {id:"back-ext",n:"Back Extension",p:"hinge",e:"gym",m:"Lower back/Glutes",inc:5},
  {id:"leg-curl",n:"Lying Leg Curl",p:"hinge",e:"gym",m:"Hamstrings",inc:5},
  {id:"hip-thrust",n:"Barbell Hip Thrust",p:"glute",e:"gym",m:"Glutes",inc:10},
  {id:"db-hip-thrust",n:"Dumbbell Hip Thrust",p:"glute",e:"db",m:"Glutes",inc:5},
  {id:"glute-bridge",n:"Glute Bridge",p:"glute",e:"bw",m:"Glutes",inc:0},
  {id:"cable-kickback",n:"Cable Glute Kickback",p:"glute",e:"gym",m:"Glutes",inc:2.5},
  {id:"hip-abduction",n:"Hip Abduction Machine",p:"glute",e:"gym",m:"Glute medius",inc:10},
  {id:"frog-pump",n:"Frog Pump",p:"glute",e:"bw",m:"Glutes",inc:0},
  {id:"kas-bridge",n:"KAS Glute Bridge",p:"glute",e:"gym",m:"Glutes",inc:10},
  {id:"walking-lunge",n:"Walking Lunge",p:"lunge",e:"db",m:"Quads/Glutes",inc:5},
  {id:"bulgarian",n:"Bulgarian Split Squat",p:"lunge",e:"db",m:"Quads/Glutes",inc:5},
  {id:"step-up",n:"Dumbbell Step-Up",p:"lunge",e:"db",m:"Quads/Glutes",inc:5},
  {id:"curtsy-lunge",n:"Curtsy Lunge",p:"lunge",e:"db",m:"Glutes/Adductors",inc:5},
  {id:"bw-lunge",n:"Bodyweight Lunge",p:"lunge",e:"bw",m:"Quads/Glutes",inc:0},
  {id:"leg-ext",n:"Leg Extension",p:"lunge",e:"gym",m:"Quads",inc:5},
  {id:"bb-bench",n:"Barbell Bench Press",p:"pushH",e:"gym",m:"Chest/Triceps",inc:5},
  {id:"db-bench",n:"Dumbbell Bench Press",p:"pushH",e:"db",m:"Chest/Triceps",inc:5},
  {id:"incline-db",n:"Incline Dumbbell Press",p:"pushH",e:"db",m:"Upper chest",inc:5},
  {id:"pushup",n:"Push-Up",p:"pushH",e:"bw",m:"Chest/Triceps",inc:0},
  {id:"dips",n:"Dips",p:"pushH",e:"bw",m:"Chest/Triceps",inc:0},
  {id:"cable-fly",n:"Cable Fly",p:"pushH",e:"gym",m:"Chest",inc:5},
  {id:"machine-chest",n:"Chest Press Machine",p:"pushH",e:"gym",m:"Chest/Triceps",inc:10},
  {id:"ohp",n:"Overhead Press (Barbell)",p:"pushV",e:"gym",m:"Shoulders/Triceps",inc:5},
  {id:"db-ohp",n:"Seated Dumbbell Press",p:"pushV",e:"db",m:"Shoulders/Triceps",inc:5},
  {id:"pike-pushup",n:"Pike Push-Up",p:"pushV",e:"bw",m:"Shoulders",inc:0},
  {id:"bb-row",n:"Barbell Row",p:"pullH",e:"gym",m:"Back/Biceps",inc:5},
  {id:"db-row",n:"One-Arm Dumbbell Row",p:"pullH",e:"db",m:"Back/Biceps",inc:5},
  {id:"cable-row",n:"Seated Cable Row",p:"pullH",e:"gym",m:"Back/Biceps",inc:5},
  {id:"machine-row",n:"Machine Row",p:"pullH",e:"gym",m:"Back/Biceps",inc:10},
  {id:"inverted-row",n:"Inverted Row",p:"pullH",e:"bw",m:"Back/Biceps",inc:0},
  {id:"pullup",n:"Pull-Up",p:"pullV",e:"bw",m:"Lats/Biceps",inc:0},
  {id:"lat-pulldown",n:"Lat Pulldown",p:"pullV",e:"gym",m:"Lats/Biceps",inc:5},
  {id:"assisted-pullup",n:"Assisted Pull-Up",p:"pullV",e:"gym",m:"Lats/Biceps",inc:5},
  {id:"straight-arm",n:"Straight-Arm Pulldown",p:"pullV",e:"gym",m:"Lats",inc:5},
  {id:"lateral-raise",n:"Dumbbell Lateral Raise",p:"shoulders",e:"db",m:"Side delts",inc:2.5},
  {id:"cable-lateral",n:"Cable Lateral Raise",p:"shoulders",e:"gym",m:"Side delts",inc:2.5},
  {id:"rear-delt-fly",n:"Rear Delt Fly",p:"shoulders",e:"db",m:"Rear delts",inc:2.5},
  {id:"face-pull",n:"Face Pull",p:"shoulders",e:"gym",m:"Rear delts/Traps",inc:5},
  {id:"bb-curl",n:"Barbell Curl",p:"arms",e:"gym",m:"Biceps",inc:5},
  {id:"db-curl",n:"Dumbbell Curl",p:"arms",e:"db",m:"Biceps",inc:2.5},
  {id:"hammer-curl",n:"Hammer Curl",p:"arms",e:"db",m:"Biceps/Forearms",inc:2.5},
  {id:"tri-pushdown",n:"Triceps Pushdown",p:"arms",e:"gym",m:"Triceps",inc:5},
  {id:"skullcrusher",n:"Skullcrusher",p:"arms",e:"db",m:"Triceps",inc:5},
  {id:"oh-tri-ext",n:"Overhead Triceps Extension",p:"arms",e:"db",m:"Triceps",inc:2.5},
  {id:"plank",n:"Plank (seconds)",p:"core",e:"bw",m:"Core",inc:0},
  {id:"hanging-knee",n:"Hanging Knee Raise",p:"core",e:"bw",m:"Abs",inc:0},
  {id:"cable-crunch",n:"Cable Crunch",p:"core",e:"gym",m:"Abs",inc:5},
  {id:"ab-wheel",n:"Ab Wheel Rollout",p:"core",e:"bw",m:"Core",inc:0},
  {id:"russian-twist",n:"Russian Twist",p:"core",e:"db",m:"Obliques",inc:2.5},
  {id:"calf-raise",n:"Standing Calf Raise",p:"calves",e:"gym",m:"Calves",inc:10},
  {id:"db-calf",n:"Dumbbell Calf Raise",p:"calves",e:"db",m:"Calves",inc:5},
  {id:"treadmill-run",n:"Treadmill Run",p:"cardio",e:"gym",m:"Cardio",inc:0,u:"time"},
  {id:"incline-walk",n:"Incline Treadmill Walk",p:"cardio",e:"gym",m:"Cardio (low impact)",inc:0,u:"time"},
  {id:"bike",n:"Stationary Bike",p:"cardio",e:"gym",m:"Cardio",inc:0,u:"time"},
  {id:"row-erg",n:"Rowing Machine",p:"cardio",e:"gym",m:"Cardio (full body)",inc:0,u:"time"},
  {id:"stair-climber",n:"Stair Climber",p:"cardio",e:"gym",m:"Cardio (glutes/legs)",inc:0,u:"time"},
  {id:"jump-rope",n:"Jump Rope",p:"cardio",e:"bw",m:"Cardio",inc:0,u:"time"},
  {id:"outdoor-run",n:"Running (outdoor)",p:"cardio",e:"bw",m:"Cardio",inc:0,u:"time"}
];
const EXBY = {}; EX.forEach(e => EXBY[e.id] = e);
function hydrateCustom(){ (S.customEx || []).forEach(c => { if (!EXBY[c.id]) { EX.push(c); } EXBY[c.id] = c; }); }
function addCustomExercise(name, unit){
  const c = { id: "custom-" + Date.now(), n: name.slice(0, 40), p: "custom", e: "bw", m: unit === "time" ? "Custom cardio" : "Custom", inc: unit === "time" ? 0 : 5, u: unit === "time" ? "time" : undefined };
  S.customEx = S.customEx || []; S.customEx.push(c); EX.push(c); EXBY[c.id] = c; save();
  return c;
}

/* ============ State (migrates old Forge data) ============ */
const KEY = "mangelo-v1";
let S = load();
hydrateCustom();
function load(){
  try { const s = JSON.parse(localStorage.getItem(KEY)); if (s && s.v === 1) return s; } catch(e){}
  try { const f = JSON.parse(localStorage.getItem("forge-v1")); if (f && f.v === 1) { f.profile = null; return f; } } catch(e){}
  return { v:1, profile:null, plan:null, logs:[], weights:[], active:null, theme:"auto" };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }

/* ============ Theme ============ */
function applyTheme(){
  const t = S.theme || "auto";
  const dark = t === "dark" || (t === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = dark ? "#0d1220" : "#f6f8fa";
}
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applyTheme);

/* ============ Science-based programming ============
   Principles encoded here (sources listed in Settings → The science):
   - 10–20 hard sets per muscle group per week for growth (Schoenfeld 2017 dose-response)
   - Each muscle trained ≥2x/week beats 1x at equal volume (Schoenfeld 2016)
   - Any 6–20 rep range grows muscle when near failure; heavier (3–6) is better for strength
   - Compounds first, when fresh; rest 2–3 min on compounds, 60–90 s on isolations (Schoenfeld 2016 rest study)
   - Progressive overload: add weight when the top of the rep range is reached on all sets */
const SPLITS = {
  balanced: {
    1:["Full Body"], 2:["Full Body A","Full Body B"], 3:["Full Body A","Full Body B","Full Body C"],
    4:["Upper A","Lower A","Upper B","Lower B"],
    5:["Push","Pull","Legs","Upper","Lower"],
    6:["Push A","Pull A","Legs A","Push B","Pull B","Legs B"]
  },
  glutes: {
    1:["Lower (Glute Focus)"], 2:["Glutes & Legs A","Glutes & Legs B"],
    3:["Glutes & Legs A","Upper","Glutes & Legs B"],
    4:["Glutes & Legs A","Upper A","Glutes & Legs B","Upper B"],
    5:["Glutes & Legs A","Upper A","Glutes & Legs B","Upper B","Glutes & Legs C"],
    6:["Glutes & Legs A","Upper A","Glutes & Legs B","Upper B","Glutes & Legs C","Upper C"]
  },
  upper: {
    1:["Upper Body"], 2:["Upper A","Upper B"],
    3:["Push","Pull","Upper"],
    4:["Push A","Pull A","Lower","Upper B"],
    5:["Push A","Pull A","Upper","Lower","Push B"],
    6:["Push A","Pull A","Upper A","Push B","Pull B","Lower"]
  }
};
const DAY_PATTERNS = {
  "Full":  ["squat","pushH","pullH","hinge","pushV","pullV","glute","core"],
  "Upper": ["pushH","pullH","pushV","pullV","shoulders","arms","arms","core"],
  "Lower": ["squat","hinge","glute","lunge","calves","core","hinge","glute"],
  "Push":  ["pushH","pushV","pushH","shoulders","arms","arms","core","pushV"],
  "Pull":  ["pullH","pullV","pullH","shoulders","arms","arms","core","pullV"],
  "Legs":  ["squat","hinge","lunge","glute","calves","core","squat","hinge"],
  "Glutes":["glute","hinge","squat","lunge","glute","hip","calves","core"]
};
// glute-focus day: glute pattern first (priority when fresh), extra hinge/lunge volume
DAY_PATTERNS["Glutes"] = ["glute","hinge","lunge","squat","glute","core","calves","glute"];
const DUR_COUNT = {20:3, 30:4, 45:5, 60:6, 75:7, 90:8};
const GOALS = {
  strength:{compound:[4,3,6],  accessory:[3,6,10]},
  muscle:  {compound:[4,6,10], accessory:[3,8,12]},
  recomp:  {compound:[3,6,10], accessory:[3,8,12]},
  general: {compound:[3,8,12], accessory:[3,10,15]}
};
const COMPOUND = new Set(["squat","hinge","pushH","pushV","pullH","pullV","glute"]);
const REST = { compound:150, accessory:90 }; // seconds — 2–3 min compounds, 60–90 s isolations

function dayType(name){
  if (name.startsWith("Glutes")) return "Glutes";
  if (name.startsWith("Full")) return "Full";
  if (name.startsWith("Lower")) return "Lower";
  if (name.startsWith("Upper")) return "Upper";
  if (name.startsWith("Push")) return "Push";
  if (name.startsWith("Pull")) return "Pull";
  if (name.startsWith("Legs")) return "Legs";
  return "Full";
}
function poolFor(equip){
  if (equip === "gym") return EX;
  if (equip === "db") return EX.filter(e => e.e === "db" || e.e === "bw");
  return EX.filter(e => e.e === "bw");
}
function generatePlan(p){
  const focus = p.focus || "balanced";
  const names = SPLITS[focus][p.days];
  const count = DUR_COUNT[p.duration] || 5;
  const pool = poolFor(p.equip);
  const goal = GOALS[p.goal];
  const usedByDay = {};
  const days = names.map(name => {
    const pats = DAY_PATTERNS[dayType(name)].filter(x => x !== "hip").slice(0, count);
    const used = new Set();
    const exercises = [];
    for (const pat of pats) {
      const opts = pool.filter(e => e.p === pat && !used.has(e.id));
      if (!opts.length) continue;
      const seen = usedByDay[pat] || 0;
      const pick = opts[seen % opts.length];
      usedByDay[pat] = seen + 1;
      used.add(pick.id);
      const isComp = COMPOUND.has(pat);
      const scheme = isComp ? goal.compound : goal.accessory;
      exercises.push({ ex: pick.id, sets: scheme[0], lo: scheme[1], hi: scheme[2], rest: isComp ? REST.compound : REST.accessory });
    }
    if (p.goal === "recomp") {
      const cardio = pool.filter(e => e.p === "cardio");
      if (cardio.length) {
        const c = cardio[(usedByDay.cardio = (usedByDay.cardio || 0) + 1) % cardio.length];
        exercises.push({ ex: c.id, sets: 1, lo: 10, hi: 15, rest: 0 });
      }
    }
    return { name, exercises };
  });
  return { created: today(), days, nextDay: 0 };
}

/* ============ Helpers ============ */
function today(){ return new Date().toLocaleDateString("en-CA"); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function e1rm(w, r){ return r > 0 ? w * (1 + r / 30) : 0; }
function lastEntry(exId){
  for (let i = S.logs.length - 1; i >= 0; i--) {
    const en = S.logs[i].entries.find(x => x.ex === exId && x.sets.some(s => s.done));
    if (en) return { date: S.logs[i].date, sets: en.sets.filter(s => s.done) };
  }
  return null;
}
function suggestFor(exId, lo, hi){
  const last = lastEntry(exId);
  const ex = EXBY[exId];
  if (!last || !ex || ex.u === "time") return null;
  const sets = last.sets;
  const maxW = Math.max(...sets.map(s => s.w || 0));
  if (!isFinite(maxW)) return null;
  if (ex.inc === 0) {
    const allTop = sets.every(s => (s.r || 0) >= hi);
    return allTop ? { text: "Hit " + hi + "+ everywhere last time — add a rep per set", w: 0 } : null;
  }
  const allTop = sets.length && sets.every(s => (s.r || 0) >= hi && (s.w || 0) >= maxW - 0.01);
  const struggled = sets.filter(s => (s.r || 0) < lo).length >= 2;
  if (allTop) return { text: "All sets hit " + hi + " @ " + maxW + " lb — go " + (maxW + ex.inc) + " lb", w: maxW + ex.inc };
  if (struggled) { const back = Math.max(ex.inc, Math.round(maxW * 0.9 / 5) * 5); return { text: "Missed reps last time — drop to ~" + back + " lb and rebuild", w: back }; }
  return { text: "Match last: " + maxW + " lb, beat the reps", w: maxW };
}
function bmi(){
  const p = S.profile;
  if (!p || !p.heightIn || !p.weightLb) return null;
  return (703 * p.weightLb / (p.heightIn * p.heightIn)).toFixed(1);
}

function weeklyVolume(logs){

    const monday = new Date(d); monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const k = monday.toLocaleDateString("en-CA");
    byWeek[k] = (byWeek[k] || 0) + l.entries.reduce((a, en) => a + en.sets.reduce((x, s) => x + (s.w || 0) * (s.r || 0), 0), 0);
  }
  return Object.entries(byWeek).sort((a, b) => a[0].localeCompare(b[0])).slice(-10).map(([k, vol]) => ({ label: k.slice(5), vol: Math.round(vol) }));
}
function chartColors(){
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  return { bar: dark ? "#5daae6" : "#4d9fdc", line: dark ? "#e56ba3" : "#d6508e", label: dark ? "#8b9ab5" : "#57606a" };
}
function drawBars(id, vals, labels){
  const c = document.getElementById(id); if (!c || !vals.length) return;
  const col = chartColors();
  const x = c.getContext("2d"), W = c.width, H = c.height, max = Math.max(...vals) || 1;
  x.clearRect(0, 0, W, H);
  const bw = Math.min(56, (W - 20) / vals.length - 8);
  vals.forEach((v, i) => {
    const h = Math.max(3, (v / max) * (H - 38));
    const px = 10 + i * ((W - 20) / vals.length) + ((W - 20) / vals.length - bw) / 2;
    x.fillStyle = col.bar; x.beginPath(); x.roundRect(px, H - 22 - h, bw, h, 4); x.fill();
    x.fillStyle = col.label; x.font = "10px sans-serif"; x.textAlign = "center";
    x.fillText(labels[i], px + bw / 2, H - 8);
    x.fillText(v >= 1000 ? (v / 1000).toFixed(1) + "k" : v, px + bw / 2, H - 27 - h);
  });
}
function drawLine(id, vals){
  const c = document.getElementById(id); if (!c || vals.length < 2) return;
  const col = chartColors();
  const x = c.getContext("2d"), W = c.width, H = c.height;
  const min = Math.min(...vals), max = Math.max(...vals), rng = (max - min) || 1;
  x.clearRect(0, 0, W, H); x.strokeStyle = col.line; x.lineWidth = 2.5; x.beginPath();
  vals.forEach((v, i) => {
    const px = 14 + (i / (vals.length - 1)) * (W - 28);
    const py = 14 + (1 - (v - min) / rng) * (H - 40);
    i ? x.lineTo(px, py) : x.moveTo(px, py);
  });
  x.stroke();
  x.fillStyle = col.label; x.font = "11px sans-serif"; x.textAlign = "left";
  x.fillText(max + " lb", 14, 12); x.fillText(min + " lb", 14, H - 6);
}
function logBw(){
  const v = Number(document.getElementById("bw-in").value);
  if (!v || v < 50 || v > 700) return toast("Enter a weight in lbs");
  S.weights = S.weights.filter(w => w.date !== today());
  S.weights.push({ date: today(), lbs: v });
  if (S.profile) S.profile.weightLb = v;
  save(); render(); toast("Logged");
}

/* ---- Settings tab ---- */

      ${["auto","light","dark"].map(t => `<span class="pill ${(S.theme||"auto")===t?"on":""}" onclick="S.theme='${t}';save();render()">${t==="auto"?"Match phone":t==="light"?"Light":"Dark"}</span>`).join("")}
    </div></div>
  <div class="card"><h3>Profile</h3>
    <p class="dim small" style="margin-bottom:4px">${esc(planLabel())}</p>
    <p class="dim small" style="margin-bottom:10px">${p.heightIn ? Math.floor(p.heightIn/12) + "'" + (p.heightIn%12) + '"' : ""}${p.weightLb ? " · " + p.weightLb + " lb" : ""}${p.age ? " · " + p.age + " yrs" : ""}${bmi() ? " · BMI " + bmi() : ""}</p>
    <button class="btn ghost full" onclick="Object.assign(Q,{goal:p.goal,focus:p.focus||'balanced',days:p.days,duration:p.duration,equip:p.equip,heightFt:p.heightIn?Math.floor(p.heightIn/12):5,heightInch:p.heightIn?p.heightIn%12:8,weightLb:p.weightLb||'',age:p.age||''});S.profile=null;save();render()">Redo questionnaire (keeps history)</button></div>
  <div class="card"><h3>The science</h3>
    <p class="dim small" style="margin-bottom:6px">Every plan MichelAngelo carves follows published resistance-training research:</p>
    <div class="exline"><span>Weekly sets per muscle</span><span class="dim">10–20 (dose-response, Schoenfeld 2017)</span></div>
    <div class="exline"><span>Muscle frequency</span><span class="dim">≥2×/week (Schoenfeld 2016 meta)</span></div>
    <div class="exline"><span>Rep ranges</span><span class="dim">3–6 strength · 6–12 muscle (near failure)</span></div>
    <div class="exline"><span>Rest between sets</span><span class="dim">2.5m compounds · 1.5m isolations</span></div>
    <div class="exline"><span>Order</span><span class="dim">Compounds first, while fresh</span></div>
    <div class="exline"><span>Progression</span><span class="dim">Add weight when all sets hit the rep-range top</span></div>
    <p class="dim small" style="margin-top:8px">Glute-focus plans front-load hip thrusts and hinges — the highest glute-activation movements in EMG studies — and train lower body up to 2× more often than upper.</p>
  </div>
  <div class="card"><h3>Backup</h3>
    <p class="dim small" style="margin-bottom:10px">Your data lives only on this phone. Export a backup now and then — clearing the browser wipes it.</p>
    <button class="btn full blue-btn" onclick="exportData()">Export backup file</button>
    <label style="margin-top:12px">Restore from backup</label>
    <input type="file" accept=".json" onchange="importData(this)">
  </div>
  <div class="card"><h3>Danger zone</h3>
    <button class="btn danger full" onclick="if(confirm('Delete ALL workout data? This cannot be undone.')){localStorage.removeItem(KEY);localStorage.removeItem('forge-v1');location.reload()}">Erase everything</button></div>
  <p class="dim small">MichelAngelo · runs offline once loaded · no account, no tracking, no subscription.</p>`;
}
function exportData(){
  const blob = new Blob([JSON.stringify(S, null, 1)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "michelangelo-backup-" + today() + ".json";
  a.click();
}
function importData(inp){
  const f = inp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try { const d = JSON.parse(r.result); if (d.v !== 1) throw 0; S = d; save(); render(); toast("Backup restored"); }
    catch(e) { toast("Not a valid backup"); }
  };
  r.readAsText(f);
}

/* ---- Init ---- */
applyTheme();
render();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("/gym/sw.js").catch(() => {});
